        Inspection score 82/100. Two critical violations: walk-in cooler
        at 9°C (should be ≤4°C), and a handwashing sink blocked by crates.
        Five minor violations. Re-inspection required within 14 days.
      evaluated: |
        The restaurant scored 82 out of 100 on its latest inspection. Two
        critical issues were found: the walk-in cooler was running at 9°C
        when it should be at or below 4°C, and a handwashing sink was
        blocked by storage crates. Five additional minor violations were
        noted. A re-inspection is required within 14 days to confirm the
        critical items are corrected.

  - id: restaurant-inspection-excellent
    human_score: excellent
    inputs:
      evaluated: |
        The restaurant passed with a score in the low 80s. Inspectors
        flagged a couple of serious problems — a cooler running too warm
        and a blocked handwashing sink — plus several smaller issues. The
        venue has to be re-inspected within two weeks to verify fixes.

  - id: restaurant-inspection-fair
    human_score: fair
    inputs:
