        plans you might have.

  # ───────────── Scientific study summary: coffee & longevity ─────────────
  - id: study-perfect
    human_score: perfect
    inputs:
      reference: |
        Observational cohort study (n=171,000). Habitual coffee drinkers
        (1.5–3.5 cups/day) had ~12% lower all-cause mortality over a
        7-year follow-up vs non-drinkers. Association persisted after
        adjusting for smoking and lifestyle. Authors caution this is
        correlational; no causal claim.
      evaluated: |
        A large observational study of around 171,000 people found that
        those drinking 1.5–3.5 cups of coffee a day had about 12% lower
        all-cause mortality over seven years compared with non-drinkers.
        The association held after adjusting for smoking and lifestyle
        factors. Because this is observational, the authors stop short
        of saying coffee causes lower mortality — only that the two
        track together in this population.

  - id: study-excellent
    human_score: excellent
    inputs:
      evaluated: |
        A large observational study reported a roughly 12% lower
        seven-year all-cause mortality rate among moderate coffee
        drinkers compared with non-drinkers. The link held after
        adjusting for known confounders, although as the authors note
        the design cannot establish cause.

  - id: study-good
    human_score: good
    inputs:
      reference: |
        Observational cohort study (n=171,000). Habitual coffee drinkers
        (1.5–3.5 cups/day) had ~12% lower all-cause mortality over a
        7-year follow-up vs non-drinkers. Association persisted after
        adjusting for smoking and lifestyle. Authors caution this is
        correlational; no causal claim.
      evaluated: |
        A study of 171,000 people linked moderate coffee drinking with
        about 12% lower mortality over seven years. The researchers
        adjusted for smoking and lifestyle. Coffee appears to be
        associated with living longer.

  - id: study-fair
    human_score: fair
    inputs:
      evaluated: |
        New research shows that drinking coffee makes you live longer.
        People who drank a few cups a day were 12% less likely to die
        over seven years. The benefit was clear even for smokers.

  - id: study-poor
    human_score: poor
    inputs:
      reference: |
        Observational cohort study (n=171,000). Habitual coffee drinkers
        (1.5–3.5 cups/day) had ~12% lower all-cause mortality over a
        7-year follow-up vs non-drinkers. Association persisted after
        adjusting for smoking and lifestyle. Authors caution this is
        correlational; no causal claim.
      evaluated: |
        Scientists have proven that coffee extends life by 12%. Drinking
        coffee is now considered medically necessary, and people who
        avoid it are significantly more likely to die early regardless
        of other habits.

