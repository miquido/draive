        18°C. A small 10% chance of an isolated thunderstorm between
        roughly 3 and 6 pm — worth keeping an eye on if you're outdoors,
        but no severe weather is currently warned. Bring a rain jacket
        rather than rearranging your day.

  - id: weather-excellent
    human_score: excellent
    inputs:
      evaluated: |
        Tomorrow afternoon will likely be rainy — about a 60% chance,
        with up to about 15 mm possible. Highs near 18°C. A small chance
        of an isolated thunderstorm in the late afternoon. No severe
        weather expected. An umbrella should be enough.

  - id: weather-poor-02
    human_score: poor
    inputs:
      reference: |
        Forecast model: 60% chance of rain tomorrow afternoon, 5–15 mm.
        Highs 18°C. Slight chance (10%) of an isolated thunderstorm
