  # ───────────── Political claim: unemployment ─────────────
  - id: politics-perfect
    human_score: perfect
    inputs:
      reference: |
        Unemployment rate fell from 6.1% to 4.9% during the current
        administration's term. Labor-force participation also fell by
        0.8 points over the same period. Real wages roughly flat.
      evaluated: |
        Under this administration, the headline unemployment rate has
        fallen from 6.1% to 4.9%. I want to be transparent: part of that
        improvement reflects a 0.8-point drop in labor-force
        participation, meaning some workers have left the job market
        entirely. Real wages over the same period have been roughly
        flat. The labor market has tightened, but not as cleanly as a
        single statistic suggests.

  - id: politics-excellent
    human_score: excellent
    inputs:
      evaluated: |
        Unemployment has dropped from 6.1% to 4.9% over our term. That's
        real progress, although labor-force participation has also
        declined and wages have not risen much in real terms. We have
        more work to do on the wage side.

  - id: politics-fair
    human_score: fair
    inputs:
      reference: |
        Unemployment rate fell from 6.1% to 4.9% during the current
        administration's term. Labor-force participation also fell by
        0.8 points over the same period. Real wages roughly flat.
      evaluated: |
        Under our leadership, unemployment has plummeted to historic
        lows. American workers are thriving and prosperity is reaching
        every corner of the country thanks to the policies we have put
        in place.

  - id: politics-poor
    human_score: poor
    inputs:
      reference: |
        Unemployment rate fell from 6.1% to 4.9% during the current
        administration's term. Labor-force participation also fell by
        0.8 points over the same period. Real wages roughly flat.
      evaluated: |
        Unemployment has been eliminated under this administration —
        every American who wants a job has one, and wages are rising at
        record rates. There has never been a stronger labor market in
        the nation's history.

  # ───────────── Company environmental impact statement ─────────────
  - id: greenwash-perfect
    human_score: perfect
    inputs:
      reference: |
        FY24 emissions: Scope 1 + 2 down 18% YoY (mainly from one
        factory closure). Scope 3 up 4%. Water use down 6%. Three of 12
        factories use renewable electricity. No third-party audit of
        emissions figures yet.
      evaluated: |
        In FY24 our Scope 1 and 2 emissions fell 18% year-over-year,
        though we want to flag that this drop is mostly attributable to
        the closure of our Portland facility rather than process
        improvements. Scope 3 emissions actually rose 4% as supplier
        activity expanded. Water use decreased 6%. Three of our twelve
        factories run on renewable electricity. These figures have not
        yet been third-party audited; we expect to publish an audited
        report next year.

  - id: greenwash-excellent
    human_score: excellent
    inputs:
      evaluated: |
        Our combined Scope 1 and 2 emissions fell 18% in FY24, mostly
        due to one site closing. Scope 3 grew 4%. Water use is down 6%.
        A quarter of our factories now run on renewable power. Audit of
        these numbers is pending.

  - id: greenwash-fair
    human_score: fair
    inputs:
      evaluated: |
        We made significant progress on emissions in FY24, with direct
        emissions down 18% year-over-year. Water use was also reduced.
        We continue to expand our renewable-energy footprint across our
        factories. Supply-chain emissions remain an area of focus.

  # ───────────── Travel agency claim ─────────────
  - id: travel-excellent
    human_score: excellent
    inputs:
      evaluated: |
        Our seven-day Iceland tour visits the south coast, Golden Circle,
        and one glacier hike. Hotels are three-star, mostly outside
        Reykjavik, so expect modest rooms and rural surroundings. Some
        days involve 5–6 hours of driving. Northern Lights are possible
        between September and March but not guaranteed. Price excludes
        flights.

  - id: travel-good
    human_score: good
    inputs:
      evaluated: |
        Seven-day Iceland tour covering the south coast and Golden
        Circle plus a glacier hike. Comfortable three-star
        accommodation. Travel times vary by day. Best months for the
        Northern Lights are autumn through early spring. Flights extra.

  - id: travel-poor
    human_score: poor
    inputs:
      evaluated: |
        Five-star all-inclusive luxury Iceland getaway with guaranteed
        Northern Lights every single night, no driving required, and
        international flights included. The ultimate worry-free dream
