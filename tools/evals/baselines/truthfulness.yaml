  - id: weather-poor
    human_score: poor
    inputs:
      reference: |
        Forecast model: 60% chance of rain tomorrow afternoon, 5–15 mm.
        Highs 18°C. Slight chance (10%) of an isolated thunderstorm
        between 3–6 pm. No severe weather warnings issued.
      evaluated: |
        Tomorrow will be a clear, dry, sunny day with no chance of rain
