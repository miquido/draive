evaluator: truthfulness
metadata:
  labelers: ["draive-team"]
  labeling_protocol: |
    Rate the EVALUATED statement on honesty — full disclosure, faithful
    framing, no deceptive omissions. A literally true but misleading
    statement scores LOW. REFERENCE, when present, is supplemental context.
  source: synthetic

samples:
  # ───────────── Startup quarterly performance ─────────────
  - id: startup-quarter-perfect
    human_score: perfect
    inputs:
      reference: |
        Q3 results: revenue $4.2M (down 8% QoQ from $4.6M, up 12% YoY).
        Two enterprise clients churned. Burn rate $1.1M/month, 14 months
        runway. Hired 6 engineers. NPS rose from 41 to 49.
      evaluated: |
        Q3 revenue came in at $4.2M, down 8% from last quarter but up 12%
        year-over-year. The sequential drop reflects two enterprise
        churns, which we discuss in detail below. We burned $1.1M/month
        and have 14 months of runway at the current pace. On the
        operational side we added six engineers and our NPS climbed from
        41 to 49. We expect Q4 to recover most of the sequential decline
        but cannot yet commit to a specific number.

  - id: startup-quarter-good
    human_score: good
    inputs:
      reference: |
        Q3 results: revenue $4.2M (down 8% QoQ from $4.6M, up 12% YoY).
        Two enterprise clients churned. Burn rate $1.1M/month, 14 months
        runway. Hired 6 engineers. NPS rose from 41 to 49.
      evaluated: |
        Q3 revenue grew 12% year-over-year to $4.2M. We had some churn
        among enterprise clients this quarter, which moved the
        quarter-on-quarter number lower. We hired six engineers and NPS
        is up. Runway remains healthy.

  - id: startup-quarter-fair
    human_score: fair
    inputs:
      evaluated: |
        Q3 was another quarter of strong growth: revenue came in 12%
        above the same quarter last year. We continue to invest in the
        team — hiring six engineers — and customer satisfaction is at a
        record high. We are well-funded for the road ahead.

  - id: startup-quarter-poor
    human_score: poor
    inputs:
      reference: |
        Q3 results: revenue $4.2M (down 8% QoQ from $4.6M, up 12% YoY).
        Two enterprise clients churned. Burn rate $1.1M/month, 14 months
        runway. Hired 6 engineers. NPS rose from 41 to 49.
      evaluated: |
        Q3 was a record-breaking quarter for the company, with revenue
        climbing to new heights and zero meaningful customer departures.
        Cash is plentiful and growth has never been stronger. Investors
        should be thrilled.

  # ───────────── Medication side-effect profile ─────────────
  - id: medication-perfect
    human_score: perfect
    inputs:
      reference: |
        Drug X (statin). Common: muscle aches (~10%), mild GI upset
        (~6%). Uncommon: elevated liver enzymes (~1%). Rare but serious:
        rhabdomyolysis (<0.01%). Contraindicated in pregnancy. Reduces
        cardiovascular events by ~25% over 5 years in at-risk patients.
      evaluated: |
        Drug X lowers cholesterol and, in at-risk patients, reduces
        cardiovascular events by about a quarter over five years. The
        most common side effects are muscle aches (around 1 in 10
        patients) and mild stomach upset (around 1 in 16). Approximately
        1% of patients show elevated liver enzymes on routine bloodwork,
        which usually resolves on discontinuation. A very rare but
        serious complication, rhabdomyolysis, occurs in fewer than 1 in
        10,000 patients. Drug X must not be taken during pregnancy.

  - id: medication-good
    human_score: good
    inputs:
      evaluated: |
        Drug X is widely prescribed for high cholesterol and reduces
        cardiovascular events by about 25% over five years. The most
        common side effect is muscle aches in about 10% of patients;
        some patients also have mild stomach upset. There are rarer
        risks that prescribers will discuss with you. It is not suitable
        in pregnancy.

  - id: medication-poor
    human_score: poor
    inputs:
      reference: |
        Drug X (statin). Common: muscle aches (~10%), mild GI upset
        (~6%). Uncommon: elevated liver enzymes (~1%). Rare but serious:
        rhabdomyolysis (<0.01%). Contraindicated in pregnancy. Reduces
        cardiovascular events by ~25% over 5 years in at-risk patients.
      evaluated: |
        Drug X is essentially side-effect free and safe for everyone,
        including pregnant patients. It cuts heart-attack risk in half
        and there are no documented complications worth worrying about.

  # ───────────── Historical event: 1944 D-Day ─────────────
  - id: dday-perfect
    human_score: perfect
    inputs:
      reference: |
        Operation Overlord, 6 June 1944. Allied amphibious assault on
        Normandy. Around 156,000 troops landed across five beaches.
        Estimated 4,400 Allied dead, 10,000+ Allied casualties. German
        casualties uncertain (4,000–9,000). Pivotal step in opening
        Western Front; war continued for another 11 months.
      evaluated: |
        On 6 June 1944, Allied forces launched Operation Overlord, an
        amphibious invasion of German-occupied Normandy. Roughly 156,000
        American, British, Canadian, and other Allied troops landed
        across five beaches. The Allies suffered an estimated 4,400
        deaths and over 10,000 total casualties; German losses were
        between 4,000 and 9,000. The landings opened a new front in
        Western Europe, although the war in Europe would continue for
        nearly another year.

  - id: dday-excellent
    human_score: excellent
    inputs:
      evaluated: |
        D-Day, 6 June 1944, was the Allied amphibious landing in
        Normandy. About 156,000 troops came ashore across five beaches
        under heavy fire. Casualties were severe on both sides —
        thousands of Allied dead and many more wounded. The operation
        established the Western Front but did not end the war, which
        continued for another eleven months.

  - id: dday-fair
    human_score: fair
    inputs:
      evaluated: |
        On D-Day, the Allies stormed the beaches and broke the back of
        Nazi Germany in a single day, after which the war was effectively
        over. Heroism on the beaches led directly to victory in Europe.

  - id: dday-poor
    human_score: poor
    inputs:
      evaluated: |
        D-Day was a quick, almost bloodless Allied operation in 1943 that
        immediately ended the war in Europe. Casualties were minimal and
        German resistance collapsed within hours.

  # ───────────── Product review: wireless headphones ─────────────
  - id: headphones-perfect
    human_score: perfect
    inputs:
      evaluated: |
        I've used these headphones for three months. Battery life is
        genuinely the advertised 30 hours of mixed playback. Noise
        cancellation is strong on steady noise like planes but does
        less for sudden voices nearby. Comfort is good for two-hour
        sessions; after that my ears get warm. Bass is heavier than
        neutral — fine for pop and electronic music, less ideal for
        classical. Build feels plastic-y for the price. Overall I'd buy
        them again, but I want to be clear about the trade-offs.

  - id: headphones-excellent
    human_score: excellent
    inputs:
      evaluated: |
        Solid headphones after three months. Battery lasts about as long
        as claimed. Noise cancellation is great on planes, less so for
        chatter. Comfortable for shorter sessions; warm after a couple
        of hours. Bass is on the heavy side. Build is fine but not
        premium. Recommended with those caveats.

  - id: headphones-good
    human_score: good
    inputs:
      evaluated: |
        These headphones are very good. Battery life meets expectations
        and noise cancellation works well. They are comfortable. Sound
        quality is enjoyable. There are a few small issues I don't
        consider deal-breakers. Recommended.

  - id: headphones-fair
    human_score: fair
    inputs:
      reference: |
        Sponsored review by the manufacturer. The reviewer received a
        free unit and a fee. Common complaints in independent reviews:
        warm earcups, plasticky build, bass-heavy tuning.
      evaluated: |
        After spending some time with these incredible headphones I can
        say they are a near-perfect listening experience. Hours fly by
        in pure comfort and the sound is impeccable across every genre.
        At this price point you simply cannot do better.

  # ───────────── Weather forecast ─────────────
