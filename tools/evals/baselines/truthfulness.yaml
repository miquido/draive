      evaluated: |
        Your daughter has improved this term from a D to a C+ in math.
        She is more engaged in our sessions and putting in effort. There
        are still some areas where she struggles that we'll continue to
        work on next term.

  - id: tutor-fair
    human_score: fair
    inputs:
      reference: |
        Student: 14 yr old. Math grade improved from D to C+ in one
        term. Homework completion ~70%. Struggles with word problems
        and algebraic manipulation. Engaged in sessions, makes effort.
      evaluated: |
        Your daughter has had a tremendous breakthrough this term and is
        excelling beyond all expectations in math. Her work ethic is
        impeccable and she is rapidly closing in on top-of-class
        performance.

  # ───────────── Job candidate self-description ─────────────
  - id: candidate-excellent
    human_score: excellent
    inputs:
      evaluated: |
        I led the migration of our payments service from a monolith to
        microservices, working with a team of four. I owned the
        architecture and code review; my colleague handled deployment
        infrastructure. The project shipped two months late but reduced
        average latency by 35%. I'm comfortable with Go and Kubernetes;
        my SQL is intermediate at best.

  - id: candidate-good
    human_score: good
    inputs:
      evaluated: |
        I led a successful migration of our payments service from a
        monolith to microservices with my team. We shipped meaningful
        latency improvements. I work primarily in Go and Kubernetes, with
        some database work as needed.

  - id: candidate-fair
    human_score: fair
    inputs:
      reference: |
        Candidate was one of four engineers on the migration; they led
        architecture but not deployment. Project was 2 months late.
        They are competent in Go, learning Kubernetes, weak SQL.
      evaluated: |
        I single-handedly architected, built, and deployed a complete
        microservices platform that transformed our payments
        infrastructure. I am an expert in Go, Kubernetes, and SQL with
        deep experience across the stack.

  - id: candidate-poor
    human_score: poor
    inputs:
      evaluated: |
        I personally invented modern microservices architecture and
        deployed it for the world's leading payments platform. I am
        universally recognised as the foremost authority on Go,
        Kubernetes, and SQL, with no peers in the industry.

  # ───────────── Friend's account of an argument ─────────────
  - id: argument-excellent
    human_score: excellent
    inputs:
      evaluated: |
        We argued at dinner. I raised my voice first when I felt cut
        off; she walked out after I called her decision "stupid," which
        was unfair of me. We both said things we regret. I think she
        was reacting to a long pattern, not just last night, and I
        haven't really acknowledged that.

  - id: argument-good
    human_score: good
    inputs:
      evaluated: |
        We had an argument over dinner. I got loud at one point and she
        left. We both said hurtful things. There's probably a longer
        pattern between us we need to work through.

  - id: argument-fair
    human_score: fair
    inputs:
      evaluated: |
        We had a disagreement and she overreacted and stormed out, which
        is her usual habit. I was just trying to discuss things calmly
        and she made it into a big drama. There's not much I could have
        done differently.

  # ───────────── Financial advisor risk disclosure ─────────────
  - id: advisor-perfect
    human_score: perfect
    inputs:
      reference: |
        Recommended fund: global equity index. Past 10-year return
        ~8% annualized. Max drawdown over the period: -34% during 2020.
        Fees 0.20% annual. Equity = capital at risk, no guarantee.
      evaluated: |
        The fund I'm recommending is a global equity index. Over the
        past ten years it has returned about 8% per year on average,
        but I want to be specific about what that average hides: during
        2020 the fund dropped 34% from peak to trough before recovering.
        Fees are 0.20% a year. Because it holds equities, your capital
        is at risk and past performance is not a guarantee of future
        returns. If a 30%+ temporary loss would force you to sell, this
        is not the right fund for you.

  - id: advisor-good
    human_score: good
    inputs:
      evaluated: |
        This global equity index fund has returned roughly 8% per year
        over the past decade, with low fees of 0.20%. There have been
        significant drops along the way, including a sharp drawdown in
        2020. As with any equity investment, you can lose money.

  - id: advisor-poor
    human_score: poor
    inputs:
      reference: |
        Recommended fund: global equity index. Past 10-year return
        ~8% annualized. Max drawdown over the period: -34% during 2020.
        Fees 0.20% annual. Equity = capital at risk, no guarantee.
      evaluated: |
        This fund is essentially a guaranteed 8% return every year with
        no real downside risk. Past performance proves it will keep
        delivering steady gains regardless of market conditions — your
        capital is safe.

