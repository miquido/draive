    human_score: perfect
    inputs:
      reference: |
        It rained heavily in Warsaw last night, flooding several streets in
        the city center.
      evaluated: |
        A heavy downpour hit Warsaw overnight and left a number of downtown
        streets under water.

  - id: weather-observation-excellent
    human_score: excellent
    inputs:
      reference: |
        It rained heavily in Warsaw last night, flooding several streets in
        the city center.
      evaluated: |
        Warsaw saw intense rainfall yesterday evening, and a few central
        roads ended up flooded.

  - id: weather-observation-good
    human_score: good
    inputs:
      reference: |
        It rained heavily in Warsaw last night, flooding several streets in
        the city center.
      evaluated: |
        Storms moved across central Poland overnight and caused localized
        flooding in a number of towns.

  - id: weather-observation-fair
    human_score: fair
    inputs:
      reference: |
        It rained heavily in Warsaw last night, flooding several streets in
        the city center.
      evaluated: |
        Warsaw has been dealing with infrastructure issues in its older
        districts for several years.

  - id: weather-observation-poor
    human_score: poor
    inputs:
      reference: |
        It rained heavily in Warsaw last night, flooding several streets in
        the city center.
      evaluated: |
