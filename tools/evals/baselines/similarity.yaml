evaluator: similarity
metadata:
  labelers: ["draive-team"]
  labeling_protocol: |
    Rate the EVALUATED text on semantic similarity to REFERENCE. Paraphrases
    score highest; topically distant content scores lowest. Style and quality
    do not factor in.
  source: synthetic

