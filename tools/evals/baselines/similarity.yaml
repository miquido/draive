  - id: urban-canopy-verylong-paraphrase-excellent
    human_score: excellent
    inputs:
      reference: |
        Urban tree canopy delivers benefits well beyond aesthetics. Trees
        lower ambient temperatures by shading pavement and buildings and by
        releasing water vapor through their leaves, an effect strong enough
        to measurably reduce a neighborhood's summer cooling costs. Their
        root systems and canopies also slow stormwater runoff, reducing the
        load on municipal drainage systems during heavy rain and lowering
        the risk of localized flooding. Beyond the physical effects, studies
        consistently link nearby greenery to lower reported stress and
        improved mental well-being among residents, and tree-lined streets
        are associated with higher property values and increased foot
        traffic to local businesses. Because the benefits scale with
        canopy size, many cities have adopted formal tree-planting targets,
        though maintaining an aging urban forest requires sustained
        funding that easily competes with other municipal priorities.
      evaluated: |
        The trees that make up a city's canopy do far more than look nice.
        By casting shade over streets and rooftops, and by releasing
        moisture from their leaves, they bring down the surrounding
        temperature enough to noticeably cut summer air-conditioning bills
        in the neighborhoods around them. Their roots and branches also help
        manage rainfall, catching and slowing water before it overwhelms the
        city's drainage systems, which in turn cuts down on the kind of
        localized flooding that heavy storms can cause. It isn't just a
        physical effect either — research repeatedly finds that people
        living near more greenery report less stress and better overall
        mental health, and streets lined with trees tend to have higher
        home values and draw more people to nearby shops. Since these
        upsides grow along with the size of the canopy itself, plenty of
        cities have set official goals for how many trees to plant, even
        though keeping an aging urban forest healthy takes ongoing money
        that has to compete against every other item on a city budget.

