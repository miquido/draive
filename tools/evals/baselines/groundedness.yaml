        The first player to reach 7 points with a margin of at least 2
        wins the tiebreak and the set. Players switch ends every 6 points
        during the tiebreak.
      evaluated: |
        A standard tennis tiebreak begins when a set is tied at 6-6 in games.
        The first player to reach 7 points with a margin of at least 2 wins
        the tiebreak and the set. Players switch ends every 6 points during
        the tiebreak.

