  # ───── Biology: insect classification (omit good) ─────
  - id: insects-perfect
    human_score: perfect
    inputs:
      reference: |
        Insects are arthropods of the class Insecta. They have a hard
        exoskeleton, a three-part body — head, thorax, and abdomen — and
        three pairs of jointed legs attached to the thorax. Most adult
        insects also have a pair of antennae and one or two pairs of wings.
      evaluated: |
        Insects belong to the arthropod class Insecta. They are covered by a
        hard exoskeleton and have a body divided into three parts: head,
        thorax, and abdomen. Three pairs of jointed legs are attached to the
        thorax, and most adult insects also have a pair of antennae and one
        or two pairs of wings.

  - id: insects-excellent
    human_score: excellent
    inputs:
      reference: |
        Insects are arthropods of the class Insecta. They have a hard
        exoskeleton, a three-part body — head, thorax, and abdomen — and
        three pairs of jointed legs attached to the thorax. Most adult
        insects also have a pair of antennae and one or two pairs of wings.
      evaluated: |
        Insects form the class Insecta within the arthropods. They share a
        hard exoskeleton and a three-part body of head, thorax, and abdomen.
        Their three pairs of jointed legs all attach to the thorax. As adults,
        most insects also have antennae and one or two pairs of wings.

  - id: insects-fair
    human_score: fair
    inputs:
      reference: |
        Insects are arthropods of the class Insecta. They have a hard
        exoskeleton, a three-part body — head, thorax, and abdomen — and
        three pairs of jointed legs attached to the thorax. Most adult
        insects also have a pair of antennae and one or two pairs of wings.
      evaluated: |
        Insects are arthropods with six legs. They breathe through a network
        of tiny tubes called tracheae that open at spiracles along the body.
        They have compound eyes made of thousands of facets and undergo
        either complete or incomplete metamorphosis. The largest order is
        Coleoptera, the beetles, with around 400,000 known species.

  - id: insects-poor
    human_score: poor
    inputs:
      reference: |
        Insects are arthropods of the class Insecta. They have a hard
        exoskeleton, a three-part body — head, thorax, and abdomen — and
        three pairs of jointed legs attached to the thorax. Most adult
        insects also have a pair of antennae and one or two pairs of wings.
      evaluated: |
        Insects are small invertebrates that include spiders, scorpions, and
        centipedes. They typically lay eggs in water and most species live
        for less than 24 hours. The oldest known insect fossil is 600 million
        years old, predating the dinosaurs by hundreds of millions of years.
        Bees produce honey using nectar from over 200 species of flowers.

