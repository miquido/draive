      reference: |
        The manufacturer's warranty on the Everline dishwasher covers parts
        and labor for defects in materials or workmanship for a period of
        two years from the original date of purchase, provided the unit
        was installed by a licensed technician and proof of purchase is
        retained. The electronic control board and motor are covered for
        an extended period of five years, but this extended coverage
        applies to the part only, not the labor to replace it, after the
        initial two-year period ends. Damage caused by improper
        installation, use of non-approved detergents, power surges, or
        commercial use in a non-residential setting voids the entire
        warranty. Cosmetic issues such as scratches or dents reported more
        than 30 days after delivery are not covered. To file a claim,
        customers must contact support with their proof of purchase and
        serial number, after which a technician visit is scheduled; if the
        unit cannot be repaired on-site within two visits, the
        manufacturer will replace it with an equivalent model at no
        charge. The warranty is non-transferable and applies only to the
        original purchaser at the original installation address.
      evaluated: |
