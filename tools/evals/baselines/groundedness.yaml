      evaluated: |
        A tiebreak settles a tied set in tennis. The first to 7 points wins
        the tiebreak. The Wimbledon final set tiebreak is played to 10
        points, while at the Australian Open it is a super-tiebreak to 10
        played in place of a deciding set. The server begins with one point
        and then the players alternate two serves each.

