    human_score: perfect
    inputs:
      reference: |
        Acme Goods accepts returns within 30 days of delivery. Items must be
        unused and in their original packaging. Refunds are issued to the
        original payment method within 7 business days of receipt at the
        warehouse. Customers pay return shipping unless the item arrived
        damaged.
      evaluated: |
        You can return an item to Acme Goods within 30 days of delivery,
        provided it is unused and still in its original packaging. Once the
        warehouse receives the return, the refund is issued back to your
        original payment method within 7 business days. Return shipping is
        paid by the customer, except when the item arrived damaged.

