  # ───── Biography: Marie Curie (omit excellent) ─────
  - id: curie-bio-perfect
    human_score: perfect
    inputs:
      reference: |
        Marie Curie was a Polish-born physicist and chemist who worked most of
        her life in France. She discovered the elements polonium and radium
        and won two Nobel Prizes: in Physics in 1903 and in Chemistry in 1911.
        She was the first woman to win a Nobel Prize.
      evaluated: |
        Marie Curie was a physicist and chemist, born in Poland, who spent
        most of her working life in France. She discovered the elements
        polonium and radium. She won two Nobel Prizes — one in Physics in 1903
        and one in Chemistry in 1911 — and was the first woman ever to receive
        a Nobel Prize.

  - id: curie-bio-good
    human_score: good
    inputs:
      reference: |
        Marie Curie was a Polish-born physicist and chemist who worked most of
        her life in France. She discovered the elements polonium and radium
        and won two Nobel Prizes: in Physics in 1903 and in Chemistry in 1911.
        She was the first woman to win a Nobel Prize.
      evaluated: |
        Marie Curie was a Polish-born scientist who worked in France. She
        discovered polonium and radium. She won Nobel Prizes in Physics
        (1903) and Chemistry (1911) and was the first woman to do so. She also
        founded the Curie Institutes, which remain major centres of cancer
        research today.

  - id: curie-bio-fair
    human_score: fair
    inputs:
      reference: |
        Marie Curie was a Polish-born physicist and chemist who worked most of
        her life in France. She discovered the elements polonium and radium
        and won two Nobel Prizes: in Physics in 1903 and in Chemistry in 1911.
        She was the first woman to win a Nobel Prize.
      evaluated: |
        Marie Curie was a Polish-born scientist who discovered radium. She
        married fellow physicist Pierre Curie, with whom she shared her first
        Nobel Prize. She named the element polonium after her homeland. Her
        notebooks remain radioactive to this day and are stored in
        lead-lined boxes at the Bibliothèque Nationale.

  - id: curie-bio-poor
    human_score: poor
    inputs:
      reference: |
        Marie Curie was a Polish-born physicist and chemist who worked most of
        her life in France. She discovered the elements polonium and radium
        and won two Nobel Prizes: in Physics in 1903 and in Chemistry in 1911.
        She was the first woman to win a Nobel Prize.
      evaluated: |
        Marie Curie was a French biologist who pioneered the use of X-rays in
        field hospitals during World War I. She was born in Warsaw in 1880,
        moved to Paris at sixteen, and later served as the first female
        professor at Oxford University. Her daughter Irène won the Nobel
        Prize in Medicine in 1935.

  # ───── Science abstract: CRISPR (omit perfect) ─────
  - id: crispr-abstract-excellent
    human_score: excellent
    inputs:
      reference: |
        We report a CRISPR-Cas9 protocol that edits the BCL11A enhancer in
        human haematopoietic stem cells. Edited cells maintained engraftment
        in immunodeficient mice for 16 weeks and showed a 78% reduction in
        target-site reads. No off-target edits were detected at the top ten
        predicted sites.
      evaluated: |
        This study describes a CRISPR-Cas9 protocol used to edit the BCL11A
        enhancer in human haematopoietic stem cells. The edited cells engraft
        in immunodeficient mice for 16 weeks. Target-site reads dropped by
        about 78%, and the ten most likely off-target sites showed no
        detectable editing.

  - id: crispr-abstract-good
    human_score: good
    inputs:
      reference: |
        We report a CRISPR-Cas9 protocol that edits the BCL11A enhancer in
        human haematopoietic stem cells. Edited cells maintained engraftment
        in immunodeficient mice for 16 weeks and showed a 78% reduction in
        target-site reads. No off-target edits were detected at the top ten
        predicted sites.
      evaluated: |
        The paper presents a CRISPR-Cas9 protocol for editing the BCL11A
        enhancer in human haematopoietic stem cells. Engraftment in
        immunodeficient mice was maintained for 16 weeks with a 78% reduction
        in target-site reads, and no off-target edits were seen at the top
        ten predicted sites. The protocol is designed to reactivate fetal
        haemoglobin as a therapy for sickle cell disease.

  - id: crispr-abstract-fair
    human_score: fair
    inputs:
      reference: |
        We report a CRISPR-Cas9 protocol that edits the BCL11A enhancer in
        human haematopoietic stem cells. Edited cells maintained engraftment
        in immunodeficient mice for 16 weeks and showed a 78% reduction in
        target-site reads. No off-target edits were detected at the top ten
        predicted sites.
      evaluated: |
        The team edits the BCL11A enhancer in haematopoietic stem cells using
        CRISPR-Cas9. The protocol uses electroporation of a ribonucleoprotein
        complex and reaches over 90% editing efficiency in less than 24
        hours. Engrafted cells were tracked in NSG mice for 16 weeks. A
        clinical trial based on this approach is now in Phase II.

  - id: crispr-abstract-poor
    human_score: poor
    inputs:
      reference: |
        We report a CRISPR-Cas9 protocol that edits the BCL11A enhancer in
        human haematopoietic stem cells. Edited cells maintained engraftment
        in immunodeficient mice for 16 weeks and showed a 78% reduction in
        target-site reads. No off-target edits were detected at the top ten
        predicted sites.
      evaluated: |
        Researchers used base-editing technology to introduce a single
        nucleotide change in the HBB gene of CD34+ cells from sickle cell
        patients. The edited cells were transplanted into 12 patients, all of
        whom showed sustained fetal haemoglobin expression above 30% after
        one year. The treatment received FDA approval in 2024.

