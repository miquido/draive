evaluator: tone_style
metadata:
  labelers: ["draive-team"]
  labeling_protocol: |
    Rate the EVALUATED passage on how closely its voice matches
    EXPECTED_TONE_STYLE. Judge only formality, mood, persona, vocabulary,
    audience fit. Content is held constant across each cluster.
  source: synthetic

samples:
  # ───────────── Fitness push notification (warm, conversational, encouraging, 2nd-person) ─────────────
  - id: fitness-perfect
    human_score: perfect
    inputs:
      expected_tone_style: |
        Warm, conversational, encouraging, second-person — fitness app push
        notification. Short, upbeat, friendly, never preachy.
      evaluated: |
        Hey, you've got this! Just a quick 20-minute walk today and you'll
        be three days into your streak. Lace up — we'll be cheering you on.

  - id: fitness-excellent
    human_score: excellent
    inputs:
      expected_tone_style: |
        Warm, conversational, encouraging, second-person — fitness app push
        notification. Short, upbeat, friendly, never preachy.
      evaluated: |
        Time for your walk! A quick 20 minutes today keeps your three-day
        streak alive. You can do this — go grab those shoes.

  - id: fitness-good
    human_score: good
    inputs:
      expected_tone_style: |
        Warm, conversational, encouraging, second-person — fitness app push
        notification. Short, upbeat, friendly, never preachy.
      evaluated: |
        Reminder: a 20-minute walk today will continue your three-day
        streak. Keeping up daily activity is important for your goals, so
        please try to fit it in.

  - id: fitness-poor
    human_score: poor
    inputs:
      expected_tone_style: |
        Warm, conversational, encouraging, second-person — fitness app push
        notification. Short, upbeat, friendly, never preachy.
      evaluated: |
        The user is hereby notified that, pursuant to the established
        activity protocol, a minimum twenty-minute ambulatory exercise
        session is required this calendar day in order to preserve the
        ongoing three-day adherence record. Non-compliance will result in
        termination of the aforementioned streak.

  # ───────────── Court judgment summary (formal, 3rd-person, neutral) ─────────────
  - id: judgment-perfect
    human_score: perfect
    inputs:
      expected_tone_style: |
        Highly formal, third-person, neutral, suitable for a court judgment
        summary. Restrained vocabulary, no contractions, no emotion.
      evaluated: |
        The Court finds that the defendant breached the contractual
        obligations set forth in clause 4.2 of the agreement dated 14
        January 2023. Accordingly, judgment is entered in favour of the
        claimant in the sum of £42,500, together with interest and costs
        to be assessed.

  - id: judgment-excellent
    human_score: excellent
    inputs:
      expected_tone_style: |
        Highly formal, third-person, neutral, suitable for a court judgment
        summary. Restrained vocabulary, no contractions, no emotion.
      evaluated: |
        The court concludes that the defendant breached clause 4.2 of the
        agreement dated 14 January 2023. Judgment is therefore entered for
        the claimant in the amount of £42,500, plus interest and costs.

  - id: judgment-fair
    human_score: fair
    inputs:
      expected_tone_style: |
        Highly formal, third-person, neutral, suitable for a court judgment
        summary. Restrained vocabulary, no contractions, no emotion.
      evaluated: |
        So basically the judge decided the defendant broke clause 4.2 of
        the 14 January 2023 contract. They've got to pay the claimant
        £42,500, plus interest and costs. Pretty clear-cut.

  - id: judgment-poor
    human_score: poor
    inputs:
      expected_tone_style: |
        Highly formal, third-person, neutral, suitable for a court judgment
        summary. Restrained vocabulary, no contractions, no emotion.
      evaluated: |
        OMG the defendant TOTALLY messed up clause 4.2!!! Like, they
        completely violated the contract from January 2023 and now they
        owe the claimant a whopping £42,500 plus interest and costs.
        Yikes. Big oof for them honestly.

