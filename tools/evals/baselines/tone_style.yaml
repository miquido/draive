  - id: safety-recall-verylongbrief-shortcontent-excellent
    human_score: excellent
    inputs:
      expected_tone_style: |
        This is a voice for a product safety recall notice. It must be
        serious and direct without being alarmist, written in plain
        language a non-expert can act on immediately. Avoid corporate
        hedging or legal throat-clearing in the opening — lead with the
        safety issue and the concrete action the customer should take.
        Avoid casual language, humor, or exclamation points; this is not a
        marketing message. Keep sentences short enough to be skimmed
        quickly by someone who may be worried. Close with a clear, low-
        friction way to get help, not a generic "thank you for your
        business" sign-off.
      evaluated: |
        Stop using your Everline space heater, model SH-220, immediately.
        A wiring defect can cause overheating and fire. Unplug it now and
        do not use it again. Call 1-800-555-0199 for a free replacement;
        have your model number ready.

