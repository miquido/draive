  # ───────────── Technical spec section ─────────────
  - id: tech-spec-perfect
    human_score: perfect
    inputs:
      expectations: |
        - Must define the function inputs (names and types).
        - Must define the function output (return value and type).
        - Must list at least one error case or failure mode.
        - Must state a performance requirement (latency, throughput, or
          time/space complexity).
      evaluated: |
        `lookup_user(user_id: str) -> User`

        Inputs:
        - `user_id`: a non-empty string containing the user's UUID.

        Output:
        - Returns a `User` object populated from the primary database.

        Errors:
        - Raises `UserNotFoundError` if no user matches the given ID.
        - Raises `DatabaseUnavailableError` after 3 failed retries.

        Performance:
        - Must complete in under 50 ms at p95 under nominal load
          (1k requests/second).

  - id: tech-spec-excellent
    human_score: excellent
    inputs:
      expectations: |
