  # ───────────── Recipe checklist ─────────────
  - id: recipe-perfect
    human_score: perfect
    inputs:
      expectations: |
        - Must list all required ingredients with quantities.
        - Must list the cooking steps in numbered order.
        - Must state total cooking time.
        - Must state how many servings the recipe yields.
        - Must mention oven temperature.
      evaluated: |
        Simple Roast Chicken (serves 4, total time 90 minutes)

        Ingredients:
        - 1 whole chicken (about 1.6 kg)
        - 2 tablespoons olive oil
        - 1 teaspoon salt
        - 1/2 teaspoon black pepper
        - 1 lemon, halved
        - 4 sprigs fresh thyme

        Steps:
        1. Preheat the oven to 200°C (400°F).
        2. Pat the chicken dry and rub with olive oil, salt, and pepper.
        3. Stuff the cavity with the lemon halves and thyme.
        4. Roast in a baking dish for 75 minutes, until juices run clear.
        5. Rest the chicken for 10 minutes before carving.

