  # ───────────── Lesson plan ─────────────
  - id: lesson-perfect
    human_score: perfect
    inputs:
      expectations: |
        - Must state a clear learning objective.
        - Must list the materials needed.
        - Must describe at least two activities or exercises.
        - Must include an assessment or way to check understanding.
      evaluated: |
        Topic: Introduction to fractions (Grade 4, 45 minutes)

        Learning objective: Students will be able to identify and write
        unit fractions (1/2, 1/3, 1/4) from visual representations.

        Materials needed: paper plates, scissors, colored markers,
        fraction-strip worksheet, exit ticket.

        Activities:
        1. Plate-folding (10 min) — Students fold paper plates into 2,
           3, and 4 equal parts and label each section.
        2. Fraction-strip matching (15 min) — In pairs, students match
           shaded strips to written fractions on a worksheet.
        3. Class discussion (10 min) — Volunteers share one fraction
           they noticed and explain why it's that fraction.

        Assessment: 5-question exit ticket — students label four
        shaded shapes with the correct fraction and answer one
        explanation question.

  - id: lesson-excellent
