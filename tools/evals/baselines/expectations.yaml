        - Must define the function output (return value and type).
        - Must list at least one error case or failure mode.
        - Must state a performance requirement (latency, throughput, or
          time/space complexity).
      evaluated: |
        `lookup_user(user_id: str) -> User`

        Takes a UUID string and returns a User object. Raises
