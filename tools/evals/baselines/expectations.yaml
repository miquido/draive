      evaluated: |
        Title: Checkout button unresponsive after coupon applied

        Severity: High

        Environment: macOS 14.4, Chrome 125.0.6422.77, app version 3.8.1

        Steps to reproduce:
        1. Log in with a standard customer account.
        2. Add any product to the cart.
        3. Apply coupon code SAVE10.
        4. Click the "Checkout" button.

        Expected: The browser navigates to the payment page.

        Actual: The button highlights briefly but no navigation occurs;
        no error is shown and the console logs `Uncaught TypeError:
        cannot read property 'total' of undefined`.

