  # ───────────── API endpoint doc checklist ─────────────
  - id: api-doc-perfect
    human_score: perfect
    inputs:
      expectations: |
        - Must state the HTTP method and path.
        - Must describe the request parameters or body.
        - Must describe the response shape on success.
        - Must list at least one error status code and its meaning.
      evaluated: |
        POST /v1/invoices

        Request body (JSON):
        - `customer_id` (string, required): the customer's UUID.
        - `amount_cents` (integer, required): total amount in cents.
        - `currency` (string, optional): ISO 4217 code, defaults to "USD".

        Success response (201 Created):
        - Returns the created invoice object with `id`, `status`, and
          `created_at` fields.

        Errors:
        - 400 Bad Request — a required field is missing or malformed.
        - 404 Not Found — no customer matches `customer_id`.

