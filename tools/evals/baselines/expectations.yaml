evaluator: expectations
metadata:
  labelers: ["draive-team"]
  labeling_protocol: |
    Rate the EVALUATED content on how many EXPECTATIONS bullets it satisfies.
    Each bullet must be verifiable from the evaluated text alone.
  source: synthetic

samples:
  # ───────────── Code review checklist ─────────────
  - id: code-review-perfect
    human_score: perfect
    inputs:
      expectations: |
        - Must reference the function name `parse_config` by name.
        - Must mention that unit tests are needed or missing.
        - Must propose at least one concrete fix or improvement.
        - Must be written in a polite, professional tone.
      evaluated: |
        Thanks for the patch! In `parse_config`, the early return when the
        path is missing swallows the error silently — could we raise a
        `ConfigError` with the offending key instead so callers get a
        useful trace? I also didn't see any unit tests covering the new
        branch; a couple of cases for the missing-key and malformed-yaml
        paths would give us confidence here. Otherwise the change looks
        clean — happy to re-review once those are in.

  - id: code-review-excellent
    human_score: excellent
    inputs:
      expectations: |
        - Must reference the function name `parse_config` by name.
        - Must mention that unit tests are needed or missing.
        - Must propose at least one concrete fix or improvement.
        - Must be written in a polite, professional tone.
      evaluated: |
        Nice work overall. In `parse_config`, I'd suggest raising a typed
        exception rather than returning `None` when the file is missing —
        callers downstream are checking for truthiness and that's fragile.
        Could you also add a unit test for the malformed-yaml branch?
        Thanks!

  - id: code-review-good
    human_score: good
    inputs:
      expectations: |
        - Must reference the function name `parse_config` by name.
        - Must mention that unit tests are needed or missing.
        - Must propose at least one concrete fix or improvement.
        - Must be written in a polite, professional tone.
      evaluated: |
        Looks reasonable. In `parse_config` I'd recommend raising an
        exception instead of returning None when the path is bad — that
        would make failures easier to debug. Thanks for the patch.

  - id: code-review-fair
    human_score: fair
    inputs:
      expectations: |
        - Must reference the function name `parse_config` by name.
        - Must mention that unit tests are needed or missing.
        - Must propose at least one concrete fix or improvement.
        - Must be written in a polite, professional tone.
      evaluated: |
        Add some tests please. Also the error handling needs work — maybe
        raise something instead of returning None.

  - id: code-review-poor
    human_score: poor
    inputs:
