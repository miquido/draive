  # ───────────── Plate tectonics ─────────────
  - id: plate-tectonics-perfect
    human_score: perfect
    inputs:
      reference: |
        Plate tectonics describes how Earth's outer shell is broken into
        large rigid pieces that slowly move over the hotter, flowing
        mantle beneath, producing earthquakes, volcanoes, and mountain
        ranges where they interact.
      evaluated: |
        Earth's outer shell is not a single solid sphere but a mosaic of a
        dozen or so rigid plates floating on the hotter, partly molten
        mantle below. Convection currents in the mantle nudge those plates
        a few centimetres per year — slow on a human scale, but enormous
        over geological time. Where two plates pull apart, magma rises to
        form new crust along mid-ocean ridges. Where they push together,
        one may dive beneath the other, melting and feeding volcanoes
        above, or the two may buckle upward into mountain ranges. Where
        they slide past each other, the built-up friction releases in
        sudden bursts that we feel as earthquakes.

  - id: plate-tectonics-excellent
    human_score: excellent
    inputs:
      reference: |
        Plate tectonics describes how Earth's outer shell is broken into
        large rigid pieces that slowly move over the hotter, flowing
        mantle beneath, producing earthquakes, volcanoes, and mountain
        ranges where they interact.
      evaluated: |
        Earth's outer shell is split into large plates that slowly move
        over the hot mantle underneath. They drift a few centimetres a
        year. Where plates pull apart, new crust forms; where they collide,
        one can slide under the other and produce volcanoes, or they push
        up mountains. When plates grind past each other, the sudden release
        of friction causes earthquakes.

  - id: plate-tectonics-good
