  # ───────────── 3D printing ─────────────
  - id: printing-3d-perfect
    human_score: perfect
    inputs:
      reference: |
        3D printing is a manufacturing process that builds an object layer
        by layer from a digital model, using materials such as plastic,
        resin, or metal.
      evaluated: |
        A 3D printer starts with a digital model of the object you want to
        make. Software slices that model into hundreds or thousands of
        thin horizontal layers and produces a path the printer can follow
        for each one. The printer then deposits material along those
        paths, one layer at a time: most consumer printers melt a strand
        of plastic and extrude it through a moving nozzle, while
        industrial machines may cure liquid resin with light or fuse metal
        powder with a laser. Each new layer bonds to the one below it
        before cooling or hardening, and after many such layers the
        digital model has become a physical object.

  - id: printing-3d-excellent
    human_score: excellent
    inputs:
      reference: |
        3D printing is a manufacturing process that builds an object layer
        by layer from a digital model, using materials such as plastic,
        resin, or metal.
      evaluated: |
        3D printing makes a physical object from a digital file by adding
        material a layer at a time. Software first slices the model into
        many flat layers. The printer then builds each layer in turn,
        usually by melting plastic through a moving nozzle, although some
        printers use resin or metal powder. Each layer sticks to the one
        below, and after enough layers the object is complete.

  - id: printing-3d-good
    human_score: good
    inputs:
      reference: |
        3D printing is a manufacturing process that builds an object layer
        by layer from a digital model, using materials such as plastic,
