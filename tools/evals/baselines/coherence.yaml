  # ───────────── How a rainbow forms ─────────────
  - id: rainbow-perfect
    human_score: perfect
    inputs:
      reference: |
        A rainbow forms when sunlight enters raindrops, bends as it passes
        into the water, reflects off the back of each drop, and bends again
        on the way out, separating the light into its colors.
      evaluated: |
        A rainbow appears when sunlight meets a sky full of raindrops. As a
        ray of sunlight enters a single drop, it slows slightly and bends,
        because light travels more slowly in water than in air. Inside the
        drop, the light strikes the curved back surface and reflects toward
        the front again. On its way back out, it bends a second time. Each
        color in the sunlight bends by a slightly different amount, so the
        single white ray fans out into a band of red, orange, yellow, green,
        blue, and violet. Millions of drops each send one color toward your
        eye from a slightly different angle, and together they paint the arc
        you see in the sky.

  - id: rainbow-excellent
