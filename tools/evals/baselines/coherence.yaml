        rely on to live and reproduce. Some block the building of the cell
        wall, so the bacterium bursts; others stop it from copying its DNA
        or making proteins. These targets differ from our own cells, so the
        drug harms the bacteria far more than the patient. Overusing
        antibiotics, though, lets resistant bacteria survive and spread.

