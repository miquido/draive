  # ───────────── Water cycle ─────────────
  - id: water-cycle-perfect
    human_score: perfect
    inputs:
      reference: |
        The water cycle describes how water continuously moves between the
        oceans, the atmosphere, and the land through evaporation,
        condensation, precipitation, and runoff.
      evaluated: |
        The water cycle begins as the sun warms the surface of oceans, lakes,
        and rivers, causing liquid water to evaporate into the air. As that
        vapor rises and cools, it condenses around tiny particles to form
        clouds. When the droplets in a cloud become heavy enough, they fall
        back to the ground as rain, snow, or hail. Some of that
        precipitation soaks into the soil and replenishes groundwater, while
        the rest runs across the land into streams and rivers that eventually
        return to the ocean. From there the sun lifts the water back into
        the air, and the cycle repeats.

  - id: water-cycle-excellent
    human_score: excellent
    inputs:
      reference: |
        The water cycle describes how water continuously moves between the
        oceans, the atmosphere, and the land through evaporation,
        condensation, precipitation, and runoff.
      evaluated: |
