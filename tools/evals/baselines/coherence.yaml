  # ───────────── How antibiotics work ─────────────
  - id: antibiotics-perfect
    human_score: perfect
    inputs:
      reference: |
        Antibiotics treat bacterial infections by interfering with
        processes that bacteria need to survive or multiply, such as
        building their cell walls or copying their DNA, without harming
        human cells in the same way.
      evaluated: |
        Antibiotics work by attacking machinery that bacteria depend on but
        human cells either lack or build differently. Some drugs, like
        penicillin, jam the construction of the rigid wall a bacterium needs
        to hold its shape; without a sound wall, the cell bursts under its
        own internal pressure. Others block the enzymes bacteria use to copy
        their DNA or to assemble proteins, so the microbes can neither repair
        themselves nor divide. Because these targets differ from our own
        cells' equivalents, the drug can cripple the bacteria while largely
        sparing the patient. Over time, though, bacteria that happen to carry
        resistant traits survive treatment and multiply, which is why
        finishing a prescribed course and avoiding needless use both matter.

  - id: antibiotics-excellent
    human_score: excellent
    inputs:
      reference: |
        Antibiotics treat bacterial infections by interfering with
        processes that bacteria need to survive or multiply, such as
        building their cell walls or copying their DNA, without harming
        human cells in the same way.
      evaluated: |
