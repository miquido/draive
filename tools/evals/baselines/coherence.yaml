        evaporates water from oceans and lakes into the air. The vapor cools
        and forms clouds. The clouds release rain or snow back to the ground.
        That water then runs off into rivers and eventually back to the ocean,
        and groundwater also feeds back into rivers. After that, the sun
        evaporates water again and it all starts over.

  - id: water-cycle-good
