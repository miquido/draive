  # ───────────── Electric circuits ─────────────
  - id: circuits-perfect
    human_score: perfect
    inputs:
      reference: |
        An electric circuit is a closed loop through which electrons flow,
        driven by a voltage source and shaped by components such as
        resistors, switches, and light bulbs.
      evaluated: |
        An electric circuit is a continuous loop along which electrons can
        move. The loop is powered by a source of voltage — a battery, for
        example — which acts a bit like a pump, pushing electrons out of
        one terminal and pulling them back in at the other. Wires guide
        that flow, while components placed along the path do useful work:
        a light bulb converts some of the electrical energy into heat and
        light, a resistor limits how quickly electrons can pass, and a
        switch can open the loop to cut the flow entirely. If the loop is
        ever broken — by a flipped switch or a snipped wire — current
        stops everywhere in the circuit, since electrons no longer have a
        complete path to follow.

  - id: circuits-excellent
    human_score: excellent
    inputs:
      reference: |
        An electric circuit is a closed loop through which electrons flow,
        driven by a voltage source and shaped by components such as
        resistors, switches, and light bulbs.
      evaluated: |
