  # ───────────── How a bicycle works ─────────────
  - id: bicycle-excellent
    human_score: excellent
    inputs:
      reference: |
        A bicycle converts the rider's pedaling motion into forward
        movement using a chain, gears, and two wheels.
      evaluated: |
        When the rider pushes the pedals, the front sprocket turns. A chain
        wraps around that sprocket and around a smaller gear on the rear
        wheel, so the rear wheel spins along with the pedals. Because the
        front sprocket is larger than the rear gear, one full pedal stroke
        rotates the rear wheel multiple times, which is why even a modest
        push moves the bike forward quickly. The handlebars steer the front
        wheel, and the rider's balance keeps the whole thing upright.

  - id: bicycle-poor
    human_score: poor
    inputs:
      reference: |
        A bicycle converts the rider's pedaling motion into forward
        movement using a chain, gears, and two wheels.
      evaluated: |
        Pedals. Chain. Bike rolls. Tires get flat sometimes. Gears. You sit
        on the seat. Forward. Handlebars to steer maybe. Two wheels usually.

  # ───────────── Caffeine ─────────────
  - id: caffeine-perfect
    human_score: perfect
    inputs:
      reference: |
        Caffeine is a stimulant that increases alertness by blocking
        adenosine receptors in the brain.
      evaluated: |
        Throughout the day, a chemical called adenosine builds up in the
        brain and binds to specialized receptors, producing the feeling of
        tiredness. Caffeine has a molecular shape similar enough to
        adenosine that it can slide into those same receptors without
        activating them, blocking adenosine from doing so. With the
        tiredness signal interrupted, neurons stay more active, the heart
        rate ticks up slightly, and the drinker feels more alert. As the
        body metabolizes caffeine over the following hours, adenosine
        regains access to its receptors and ordinary tiredness returns.

  - id: caffeine-fair
    human_score: fair
    inputs:
      reference: |
        Caffeine is a stimulant that increases alertness by blocking
        adenosine receptors in the brain.
      evaluated: |
        Coffee has caffeine. People drink it. Adenosine is in the brain.
        Caffeine wakes you up. There are receptors. Too much is bad. Tea
        also has it.

  # ───────────── DNA and genes ─────────────
  - id: dna-perfect
    human_score: perfect
    inputs:
      reference: |
        DNA is a long molecule inside cells that stores genetic information
        in sequences called genes, which the cell reads to build proteins.
      evaluated: |
        Inside almost every cell of a living organism sits a long, twisted
        molecule called DNA. The molecule is built from four chemical
        letters — A, T, C, and G — arranged in a precise order. Stretches of
        that order are grouped into units called genes, and each gene acts
        like a recipe. When the cell needs a particular protein, it copies
        the matching gene into a working draft, then hands that draft to
        molecular machinery that translates the letters into a chain of
        amino acids. The resulting protein folds into a specific shape and
        carries out a specific job, which is how the instructions written in
        DNA become the structures and behaviors of a living body.

  - id: dna-excellent
    human_score: excellent
    inputs:
      reference: |
        DNA is a long molecule inside cells that stores genetic information
        in sequences called genes, which the cell reads to build proteins.
      evaluated: |
        DNA is the molecule that stores genetic information. It is made of
        four bases — A, T, C, and G — strung together in a long sequence.
        Specific stretches of that sequence are called genes. Each gene
        codes for a protein. When the cell needs that protein, it reads the
        gene and builds the protein from amino acids. Proteins then do most
        of the work in the body, from digesting food to building muscle.

  - id: dna-good
    human_score: good
    inputs:
      reference: |
        DNA is a long molecule inside cells that stores genetic information
