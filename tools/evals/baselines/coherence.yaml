  # ───────────── Tides ─────────────
  - id: tides-perfect
    human_score: perfect
    inputs:
      reference: |
        Ocean tides are the regular rise and fall of sea levels caused
        primarily by the gravitational pull of the Moon, and to a lesser
        extent the Sun, on Earth's water.
      evaluated: |
        Ocean tides happen because the Moon's gravity tugs on Earth, and
        water — being free to flow — responds to that tug more easily than
        the solid ground does. On the side of Earth facing the Moon, water
        bulges slightly toward it; on the opposite side, the planet itself
        is pulled away from the water, leaving a second bulge behind. As
        Earth rotates beneath these two bulges roughly once a day, any
        given coastline passes through them in turn, experiencing two high
        tides and two low tides. The Sun adds a smaller second pull, and
        when Sun and Moon align, the combined effect produces the largest
        tides, known as spring tides.

  - id: tides-excellent
    human_score: excellent
    inputs:
      reference: |
        Ocean tides are the regular rise and fall of sea levels caused
        primarily by the gravitational pull of the Moon, and to a lesser
        extent the Sun, on Earth's water.
      evaluated: |
        Tides are caused by the Moon's gravity pulling on the oceans. The
        water bulges toward the Moon on one side of Earth and on the
        opposite side as well. As Earth rotates, every coast passes through
        the bulges, which is why we see two high tides and two low tides a
        day. The Sun also contributes a smaller effect, and when both align
        you get especially big tides.

  - id: tides-good
    human_score: good
    inputs:
      reference: |
        Ocean tides are the regular rise and fall of sea levels caused
