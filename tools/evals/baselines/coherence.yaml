  # ───────────── How lightning forms ─────────────
  - id: lightning-perfect
    human_score: perfect
    inputs:
      reference: |
        Lightning forms when charges separate inside a storm cloud,
        building a strong electric field that eventually overcomes the
        air's resistance and discharges as a bright bolt.
      evaluated: |
        Lightning begins inside a towering storm cloud, where strong updrafts
        toss ice crystals and water droplets against one another. These
        collisions strip away electric charge, and the lighter, positively
        charged particles drift to the top of the cloud while the heavier,
        negatively charged ones gather near the bottom. As the separation
        grows, so does the electric field between the regions, and between
        the cloud and the ground below. Eventually the field becomes so
        intense that it tears electrons free from the air molecules in its
        path, carving a conductive channel. Charge then surges through that
        channel in a fraction of a second, heating the air explosively and
        producing the brilliant flash we see and the thunder we hear.

