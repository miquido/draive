        inspection. Walk the system periodically and look for debris such as
        leaves or branches resting on the panels, and watch for new shade
        cast by trees or structures that have grown or changed since
        installation. At the same time, check that wiring and connectors are
        secure, since loose cables can interrupt output. The clearest warning
        sign is an unexplained drop in production, which often points to one
        of these issues. Cleaning is rarely the main concern: ordinary rain
        washes away most dust on its own, so a deliberate wash is only worth
        the effort when stubborn pollen or a long dry spell leaves a film
        that rain cannot clear.

