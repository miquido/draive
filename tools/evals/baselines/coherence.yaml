  # ───────────── Vaccines ─────────────
  - id: vaccines-perfect
    human_score: perfect
    inputs:
      reference: |
        Vaccines train the immune system to recognize a specific pathogen
        by exposing the body to a weakened, inactivated, or partial form of
        it, so that a real infection can be neutralized quickly.
      evaluated: |
        A vaccine works by showing the immune system what a dangerous
        pathogen looks like without exposing the body to the full disease.
        It does this with a weakened or inactivated version of the pathogen,
        or just a recognisable piece of it — often a single protein from
        the surface. Specialised white blood cells encounter that material,
        learn its molecular shape, and produce antibodies that can lock
        onto it. Once the body has rehearsed this response, a small
        population of memory cells stays behind. If the real pathogen ever
        arrives, those memory cells trigger antibody production within
        hours instead of days, stopping the infection before it can take
        hold.

  - id: vaccines-excellent
    human_score: excellent
    inputs:
      reference: |
        Vaccines train the immune system to recognize a specific pathogen
        by exposing the body to a weakened, inactivated, or partial form of
        it, so that a real infection can be neutralized quickly.
      evaluated: |
        Vaccines work by teaching the immune system to recognise a
        pathogen. The vaccine contains a harmless version — weakened, dead,
        or just a piece of the pathogen. White blood cells study it and
        make antibodies. The body also keeps memory cells. If the real
        pathogen shows up later, those memory cells respond quickly so the
        person doesn't get sick.

  - id: vaccines-good
    human_score: good
    inputs:
      reference: |
        Vaccines train the immune system to recognize a specific pathogen
        by exposing the body to a weakened, inactivated, or partial form of
        it, so that a real infection can be neutralized quickly.
      evaluated: |
        Vaccines protect against diseases. They use a weak form of the
