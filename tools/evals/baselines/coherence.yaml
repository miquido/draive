evaluator: coherence
metadata:
  labelers: ["draive-team"]
  labeling_protocol: |
    Rate the EVALUATED passage purely on structural coherence relative to the
    REFERENCE topic. Ignore factual correctness, depth, and style.
  source: synthetic

samples:
  # ───────────── Photosynthesis ─────────────
  - id: photosynthesis-perfect
    human_score: perfect
    inputs:
      reference: |
        Photosynthesis is the process by which plants convert sunlight, water,
        and carbon dioxide into glucose and oxygen.
      evaluated: |
        Photosynthesis begins when chlorophyll in a plant's leaves absorbs
        energy from sunlight. That energy splits water molecules drawn up from
        the roots, releasing oxygen as a byproduct. At the same time, the
        plant pulls carbon dioxide from the air through tiny pores called
        stomata. Using the captured energy, it combines the carbon dioxide
        with hydrogen from the split water to build glucose. The glucose then
        feeds the plant's growth, while the oxygen returns to the atmosphere
        and, in turn, fuels nearly every animal on Earth.

  - id: photosynthesis-good
    human_score: good
    inputs:
      reference: |
        Photosynthesis is the process by which plants convert sunlight, water,
        and carbon dioxide into glucose and oxygen.
      evaluated: |
        Plants do photosynthesis to make food. Chlorophyll catches sunlight.
        Water is split into hydrogen and oxygen. Carbon dioxide is also needed
        and comes in through the leaves. The plant makes glucose this way,
        which it uses to grow. Oxygen is also created, which is what we
        breathe. Stomata are little holes in the leaves where gases move.
        Photosynthesis is happening in green plants all the time during the
        day.

  - id: photosynthesis-poor
    human_score: poor
    inputs:
      reference: |
        Photosynthesis is the process by which plants convert sunlight, water,
        and carbon dioxide into glucose and oxygen.
      evaluated: |
        Glucose. Plants are green. Oxygen, we breathe it. Carbon dioxide is
        bad sometimes but plants like it. Chlorophyll. Stomata is a word.
        Water from the ground or rain. Sun. Plants make food from
        photosynthesis which is how it works.

  # ───────────── Compound interest ─────────────
  - id: compound-interest-perfect
    human_score: perfect
    inputs:
      reference: |
        Compound interest is the effect of earning interest both on an
        original deposit and on the interest already accrued, causing the
        balance to grow exponentially over time.
      evaluated: |
        Imagine you deposit $1,000 in an account that pays 5% per year. After
        the first year, you have $1,050 — your original deposit plus $50 in
        interest. In the second year, however, the 5% is calculated on the
        full $1,050, not just the original $1,000, so you earn $52.50 instead
        of $50. Each year the base grows a little larger, and so does the
        interest it produces. Over a few decades that compounding effect
        dwarfs the original deposit, which is why long-term savers care more
        about the rate of compounding than about the size of any single
        contribution.

  - id: compound-interest-excellent
    human_score: excellent
    inputs:
      reference: |
        Compound interest is the effect of earning interest both on an
        original deposit and on the interest already accrued, causing the
        balance to grow exponentially over time.
      evaluated: |
        Compound interest pays you interest on top of interest you've already
        earned. Say you have $1,000 at 5% per year. After year one, you'd
        have $1,050. In year two, the 5% applies to that $1,050, so you earn
        $52.50 — slightly more than the year before. This pattern continues
        each year. Over long periods the balance grows much faster than with
        simple interest, since each year's growth widens the base for the
        next.

  - id: compound-interest-fair
    human_score: fair
    inputs:
      reference: |
        Compound interest is the effect of earning interest both on an
        original deposit and on the interest already accrued, causing the
        balance to grow exponentially over time.
      evaluated: |
        Compound interest means more interest. Banks pay it. A higher rate is
        better. Starting young matters a lot. $1,000 can become $5,000 over
        time. There is also simple interest, which is different. Compound
        interest is what makes savings grow.

  # ───────────── Sourdough bread ─────────────
  - id: sourdough-excellent
    human_score: excellent
    inputs:
      reference: |
        Sourdough bread is leavened using a fermented mixture of flour and
        water that hosts wild yeast and lactic-acid bacteria instead of
        commercial baker's yeast.
      evaluated: |
        Sourdough bread begins with a starter — a mixture of flour and water
        that captures wild yeast and lactic-acid bacteria from the
        environment. The baker feeds the starter for several days until it
        becomes bubbly and reliably active. To bake, the starter is mixed
        with flour, water, and salt to form a dough, which is folded and
        rested over several hours so the wild microbes can ferment the
        sugars. Fermentation produces carbon dioxide that lifts the loaf and
        organic acids that give sourdough its tang. The shaped loaf is then
        baked at high heat to set the crumb and crust.

  - id: sourdough-good
