evaluator: fluency
metadata:
  labelers: ["draive-team"]
  labeling_protocol: |
    Rate the EVALUATED text on linguistic fluency — grammar, word choice,
    naturalness, idiom. Ignore content accuracy, coherence, and structure.
  source: synthetic

samples:
  # ───────────── Hotel description ─────────────
