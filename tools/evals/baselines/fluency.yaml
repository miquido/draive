  # ═════════ Length-variation cases (long content) ═════════
  - id: fluency-long-content-excellent
    human_score: excellent
    inputs:
      evaluated: |
        Moving to a new city is equal parts thrilling and disorienting. For the
        first few weeks, even small errands feel like puzzles: you learn which
        bus actually shows up on time, which café will let you sit for an hour
        with one coffee, and which neighbour is happy to sign for a parcel. The
        loneliness can be sharp at first, but it tends to soften as routines
        take hold. One day you give a stranger directions without thinking, and
        you realise the unfamiliar streets have quietly become your own. The
        city stops being a place you are visiting and starts being home.
