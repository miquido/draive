  # ───────────── Pour-over coffee ─────────────
  - id: pour-over-excellent
    human_score: excellent
    inputs:
      reference: |
        How to brew a clean, balanced cup of pour-over coffee at home
        using a basic dripper, paper filter, and gooseneck kettle.
      evaluated: |
        Heat water to just off the boil and rinse the paper filter in
        the dripper to remove papery flavours. Add freshly ground
        coffee at a ratio of about sixty grams per litre, ground
        medium-fine — somewhere between table salt and sand. Most
        modern recipes are variations on a theme first popularised by
        the third-wave cafe scene, but the underlying mechanics are
        simple. Bloom the grounds with twice their weight in water,
        then pour the remainder in slow concentric circles, aiming
        for a total brew time of around three minutes.

  - id: pour-over-good
    human_score: good
    inputs:
      reference: |
        How to brew a clean, balanced cup of pour-over coffee at home
        using a basic dripper, paper filter, and gooseneck kettle.
      evaluated: |
        A clean pour-over starts with freshly roasted coffee, the
        right grind size, and water just off the boil. Beyond
        technique, gear can pull you in many directions. People
        debate ceramic versus glass drippers, the merits of various
        gooseneck kettles, and whether a refractometer is worth it
        for a home set-up. Burr grinders, in particular, make a
        bigger difference than almost any other purchase — the
        consistency of the grind sets the ceiling on what the rest
        of your equipment can achieve.

