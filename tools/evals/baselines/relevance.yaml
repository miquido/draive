        familiar lead-acid design has barely changed in principle for over
        a century, storing energy in plates of lead suspended in sulfuric
        acid. Electric vehicles, by contrast, rely on lithium-ion packs
        that store far more energy by weight, which is the single biggest
        reason their range has improved so quickly in recent years.

