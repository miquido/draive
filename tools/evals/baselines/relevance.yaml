        for green so it doesn't turn bitter — and use about a teaspoon of
        leaf per cup. The whole reason loose leaf beats most bags is that
        the leaves have room to open up and release their flavour, which is
        also why those roomy pyramid bags caught on. Steep black tea a few
        minutes and green tea less, taste as you go, and strain promptly so
        it doesn't get astringent.

