  # ───────────── Brewing loose-leaf tea ─────────────
  - id: tea-brewing-perfect
    human_score: perfect
    inputs:
      reference: |
        How to brew a good cup of loose-leaf tea, covering water
        temperature, leaf quantity, and steeping time for common types.
      evaluated: |
        Start with fresh, just-boiled water, but match the temperature to
        the leaf: black and herbal teas take a full boil, oolongs around
        ninety degrees, and delicate greens nearer seventy-five, since
        boiling water scorches them and turns them bitter. Use roughly one
        slightly heaped teaspoon of leaf per cup, giving the leaves room to
        unfurl rather than cramming them into a tight ball. Steep black tea
        three to five minutes, green tea two to three, and oolong a little
        longer, tasting as you go. Strain the leaves out promptly so the
        brew doesn't over-extract, and remember that good leaves are happy
        to be steeped a second or third time.

