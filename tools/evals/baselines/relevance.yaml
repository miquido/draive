  # ───────────── Jump-starting a car battery ─────────────
  - id: jump-start-perfect
    human_score: perfect
    inputs:
      reference: |
        How to jump-start a car with a dead battery using jumper cables and
        a second vehicle.
      evaluated: |
        Park the working car close enough to reach but not touching the
        dead one, and switch both engines off. Connect one red clamp to the
        positive terminal of the dead battery and the other red clamp to the
        positive terminal of the good battery. Attach one black clamp to the
        negative terminal of the good battery, and the final black clamp to
        an unpainted metal point on the dead car's engine block, away from
        the battery, to avoid sparks near it. Start the working car and let
        it run a couple of minutes, then start the dead car. Once it's
        running, remove the clamps in the reverse order, and keep the
        revived car running or driving for a while to recharge.

  - id: jump-start-excellent
    human_score: excellent
    inputs:
      reference: |
        How to jump-start a car with a dead battery using jumper cables and
        a second vehicle.
      evaluated: |
        Bring the two cars close, engines off. Clamp red to positive on the
        dead battery, red to positive on the good one, black to negative on
        the good one, and the last black to bare metal on the dead car's
        engine rather than the battery. Lithium jump packs have made the
        second car optional for many drivers these days, but the clamp
        order is the same idea. Start the donor car, then the dead one,
        remove the cables in reverse, and drive a while to recharge.

  - id: jump-start-good
    human_score: good
    inputs:
      reference: |
        How to jump-start a car with a dead battery using jumper cables and
        a second vehicle.
      evaluated: |
        Connect the cables positive to positive and negative to a ground
        point, start the good car, then the dead one. Worth stepping back,
        though: a battery that dies repeatedly is usually telling you
        something. Most car batteries last only three to five years, and
        cold weather, short trips that never fully recharge them, and a
        dome light left on overnight all shorten that life. If yours keeps
        going flat, it may be time to test the alternator or simply replace
        the battery.

  - id: jump-start-fair
    human_score: fair
    inputs:
      reference: |
        How to jump-start a car with a dead battery using jumper cables and
        a second vehicle.
      evaluated: |
