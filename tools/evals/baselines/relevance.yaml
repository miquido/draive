  # ───────────── Marathon training ─────────────
  - id: marathon-training-good
    human_score: good
    inputs:
      reference: |
        How to train for a first marathon over a four- to five-month
        block, including weekly structure and the long run.
      evaluated: |
        A first marathon plan typically runs sixteen to twenty weeks
        with a weekly long run, two easy runs, and a rest day or
        cross-training. Beyond the running itself, race-day logistics
        deserve almost as much attention. Travel and accommodation
        near a big-city race need to be booked early. On the morning
        of the race, eat what you've practised with on long runs,
        arrive early to deal with bag drop and queues for the toilets,
        and remember that the first few kilometres will feel
        deceptively easy — pace discipline is the single biggest
        determinant of how the last ten kilometres go.

