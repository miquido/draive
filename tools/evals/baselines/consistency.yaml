evaluator: consistency
metadata:
  labelers: ["draive-team"]
  labeling_protocol: |
    Rate the EVALUATED passage on factual/logical consistency with REFERENCE.
    Contradictions count; stylistic differences do not. Labelers judge only
    against the reference text, not external knowledge.
  source: synthetic

samples:
  # ───────────── Mercury (planet facts) ─────────────
  - id: mercury-perfect
    human_score: perfect
    inputs:
      reference: |
        Mercury is the closest planet to the Sun and the smallest planet in
        our solar system. It has no moons and completes one orbit of the Sun
        in about 88 Earth days.
      evaluated: |
        Mercury sits nearer to the Sun than any other planet and is the
        smallest in our solar system. It has no moons of its own and
        finishes a full lap around the Sun in roughly 88 Earth days.

  - id: mercury-good
    human_score: good
    inputs:
      reference: |
        Mercury is the closest planet to the Sun and the smallest planet in
        our solar system. It has no moons and completes one orbit of the Sun
        in about 88 Earth days.
      evaluated: |
        Mercury is the closest planet to the Sun and the smallest in the
        solar system. It has no moons and orbits the Sun in around 90 Earth
        days.

  - id: mercury-fair
    human_score: fair
    inputs:
      reference: |
        Mercury is the closest planet to the Sun and the smallest planet in
        our solar system. It has no moons and completes one orbit of the Sun
        in about 88 Earth days.
      evaluated: |
        Mercury is the closest planet to the Sun. It is the second smallest
        planet in the solar system and has two small moons. Its orbit lasts
        about 88 Earth days.

  - id: mercury-poor
    human_score: poor
    inputs:
      reference: |
        Mercury is the closest planet to the Sun and the smallest planet in
        our solar system. It has no moons and completes one orbit of the Sun
        in about 88 Earth days.
      evaluated: |
        Venus is the closest planet to the Sun and the largest planet in the
        solar system. Mercury has three moons and takes 365 Earth days to
        orbit the Sun.

