  # ───────────── HTTP status codes ─────────────
  - id: http-perfect
    human_score: perfect
    inputs:
      reference: |
        HTTP status code 200 indicates a successful request. 404 means the
        requested resource could not be found. 500 signals an internal
        server error.
      evaluated: |
        A 200 HTTP status code reports that a request succeeded. A 404 means
        the server could not find the requested resource. A 500 indicates an
        internal server error.

  - id: http-excellent
    human_score: excellent
    inputs:
      reference: |
        HTTP status code 200 indicates a successful request. 404 means the
        requested resource could not be found. 500 signals an internal
        server error.
      evaluated: |
        HTTP returns 200 when a request succeeds, 404 when the requested
        resource is missing, and 500 when the server hits an internal error
        while processing the request.

  - id: http-good
    human_score: good
    inputs:
      reference: |
        HTTP status code 200 indicates a successful request. 404 means the
        requested resource could not be found. 500 signals an internal
        server error.
      evaluated: |
        HTTP 200 means a successful request. 404 means the resource was not
        found. 500 means an internal server error. 301 is used for permanent
        redirects.

