      evaluated: |
        The price of a bond and its yield move in opposite directions: a
        rising price corresponds to a falling yield, while a falling price
        corresponds to a rising yield.

  - id: bonds-good
    human_score: good
    inputs:
      reference: |
        Bond prices and yields move in opposite directions. When the price
        of a bond rises, its yield falls, and when the price falls, the
        yield rises.
      evaluated: |
        Bond prices and yields move in opposite directions, so when a bond's
        price rises its yield falls. Bonds are generally seen as safer
        investments than stocks.

  - id: bonds-fair
    human_score: fair
    inputs:
      reference: |
        Bond prices and yields move in opposite directions. When the price
        of a bond rises, its yield falls, and when the price falls, the
        yield rises.
      evaluated: |
        Bond prices and yields tend to move together. When the price of a
        bond rises, its yield usually rises as well.

  - id: bonds-poor
    human_score: poor
    inputs:
      reference: |
        Bond prices and yields move in opposite directions. When the price
        of a bond rises, its yield falls, and when the price falls, the
        yield rises.
      evaluated: |
        Bond prices and yields always move in the same direction. When a
        bond's price rises, its yield rises with it, and when the price
        falls, the yield falls too.

