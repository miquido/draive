  # ───────────── French passé composé ─────────────
  - id: french-perfect
    human_score: perfect
    inputs:
      reference: |
        In French, the passé composé is formed with a present-tense
        auxiliary verb — either "avoir" or "être" — followed by the past
        participle of the main verb. Most verbs use "avoir", but a small
        group of motion and reflexive verbs use "être".
      evaluated: |
        The French passé composé pairs a present-tense auxiliary verb,
        either "avoir" or "être", with the past participle of the main verb.
        Most verbs take "avoir", while a small set of motion and reflexive
        verbs take "être".

  - id: french-fair
    human_score: fair
    inputs:
      reference: |
        In French, the passé composé is formed with a present-tense
        auxiliary verb — either "avoir" or "être" — followed by the past
        participle of the main verb. Most verbs use "avoir", but a small
        group of motion and reflexive verbs use "être".
      evaluated: |
        The French passé composé uses an imperfect-tense auxiliary verb
        followed by the past participle. Most verbs use "être", and only a
        few verbs use "avoir".

  - id: french-poor
    human_score: poor
    inputs:
      reference: |
        In French, the passé composé is formed with a present-tense
        auxiliary verb — either "avoir" or "être" — followed by the past
        participle of the main verb. Most verbs use "avoir", but a small
        group of motion and reflexive verbs use "être".
      evaluated: |
        The French passé composé is a single-word tense formed by adding the
        ending "-ais" to the verb stem. There are no auxiliary verbs
        involved and no past participles.

