      evaluated: |
        An octopus is an invertebrate, equipped with eight arms and three
        hearts. It can shift both the color and the texture of its skin to
        blend in, and most species live alone except when mating.

  - id: octopus-excellent
    human_score: excellent
    inputs:
      reference: |
        Octopuses are invertebrates with eight arms and three hearts. They
        can change the color and texture of their skin for camouflage, and
        most species are solitary outside of mating.
      evaluated: |
        Octopuses lack a backbone, have eight arms, and possess three
        hearts. They camouflage themselves by altering the color and texture
        of their skin, and outside of mating most species keep to
        themselves.

  - id: octopus-fair
    human_score: fair
    inputs:
      reference: |
        Octopuses are invertebrates with eight arms and three hearts. They
        can change the color and texture of their skin for camouflage, and
        most species are solitary outside of mating.
      evaluated: |
        Octopuses are vertebrates with eight arms and a single heart. They
        change their skin color for camouflage, and most species live alone
        except during mating.
