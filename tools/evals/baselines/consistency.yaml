  # ───────────── Tennis tiebreak rules ─────────────
  - id: tennis-perfect
    human_score: perfect
    inputs:
      reference: |
        In standard tennis tiebreaks, the first player to reach 7 points
        wins, but they must lead by at least 2 points. Players alternate
        serve after the first point, then every two points thereafter.
      evaluated: |
        A standard tennis tiebreak is decided by the first player to reach
        7 points, provided they are ahead by at least 2. Service alternates
        between players after the first point and then every two points
        afterward.

  - id: tennis-excellent
    human_score: excellent
    inputs:
      reference: |
        In standard tennis tiebreaks, the first player to reach 7 points
        wins, but they must lead by at least 2 points. Players alternate
        serve after the first point, then every two points thereafter.
      evaluated: |
        Tiebreaks in standard tennis go to whichever player first hits 7
        points, so long as their lead is at least 2. After the opening
        point, serve switches, and from then on it changes every two
        points.

  - id: tennis-fair
    human_score: fair
    inputs:
      reference: |
        In standard tennis tiebreaks, the first player to reach 7 points
        wins, but they must lead by at least 2 points. Players alternate
        serve after the first point, then every two points thereafter.
      evaluated: |
        In a standard tennis tiebreak the first to 7 points wins, even by a
        single point. Serve switches every three points throughout the
        tiebreak.

  - id: tennis-poor
    human_score: poor
    inputs:
      reference: |
        In standard tennis tiebreaks, the first player to reach 7 points
        wins, but they must lead by at least 2 points. Players alternate
        serve after the first point, then every two points thereafter.
      evaluated: |
        In a standard tennis tiebreak, the first player to reach 5 points
        wins outright with no lead requirement. One player serves the entire
        tiebreak from start to finish.

