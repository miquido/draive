        Mitochondria are organelles found in most eukaryotic cells. They
        generate most of the cell's supply of ATP, which serves as a source
        of chemical energy.
      evaluated: |
        Mitochondria are organelles present in the great majority of
        eukaryotic cells. They produce most of the ATP a cell uses, which
        functions as its chemical energy currency.

  - id: mitochondria-excellent
    human_score: excellent
    inputs:
      reference: |
        Mitochondria are organelles found in most eukaryotic cells. They
        generate most of the cell's supply of ATP, which serves as a source
        of chemical energy.
      evaluated: |
        Found in nearly all eukaryotic cells, mitochondria are the organelles
        responsible for generating the bulk of the cell's ATP, the molecule
        that delivers chemical energy where it is needed.

  - id: mitochondria-good
    human_score: good
    inputs:
      reference: |
        Mitochondria are organelles found in most eukaryotic cells. They
        generate most of the cell's supply of ATP, which serves as a source
        of chemical energy.
      evaluated: |
        Mitochondria are organelles in most eukaryotic cells. They make ATP,
        the cell's chemical energy source, and they have their own small
