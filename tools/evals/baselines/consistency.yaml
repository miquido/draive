  - id: mitochondria-poor
    human_score: poor
    inputs:
      reference: |
        Mitochondria are organelles found in most eukaryotic cells. They
        generate most of the cell's supply of ATP, which serves as a source
        of chemical energy.
      evaluated: |
        Mitochondria are large molecules found only in plant cells. They
        store DNA but do not produce ATP, which is instead made in the
        nucleus.

