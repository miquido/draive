  - id: currencies-perfect
    human_score: perfect
    inputs:
      evaluated: |
        The currency of Japan is the yen, and the currency of the United
        Kingdom is the pound sterling. The euro is the official currency of
        Germany, France, and Italy. The United States uses the dollar.

  - id: currencies-excellent
    human_score: excellent
    inputs:
      evaluated: |
        Japan uses the yen and the United Kingdom uses the pound sterling.
        The euro is the shared currency of many European Union members,
        including France and Germany. India's currency is the rupee.

  - id: currencies-good
    human_score: good
    inputs:
      evaluated: |
        Japan uses the yen, the UK uses the pound, and the United States uses
        the dollar. Switzerland uses the euro.

  - id: currencies-fair
    human_score: fair
    inputs:
      evaluated: |
        Japan uses the won, and the United Kingdom uses the euro. The United
        States uses the dollar, and Germany uses the deutsche mark today.

  - id: currencies-poor
    human_score: poor
    inputs:
      evaluated: |
        Japan uses the dollar, the United Kingdom uses the yen, and the
        United States uses the pound. France's official currency is the
        peso, and Germany uses the ruble.

