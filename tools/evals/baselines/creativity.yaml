evaluator: creativity
metadata:
  labelers: ["draive-team"]
  labeling_protocol: |
    Rate the EVALUATED content on originality and imaginative framing
    relative to typical examples of the same form (poem, tagline, pitch,
    etc.). Ignore grammar, accuracy, and topic.
  source: synthetic

samples:
  # ───────────── Short poem (theme: autumn) ─────────────
  - id: poem-poor
    human_score: poor
    inputs:
      evaluated: |
        Leaves are falling from the trees,
        Blowing gently in the breeze.
        Autumn colors red and gold,
        Days grow short and nights grow cold.

  - id: poem-fair
    human_score: fair
    inputs:
      evaluated: |
        October paints the world in gold,
        A season warm before the cold.
        The harvest moon hangs in the sky,
        And summer whispers its goodbye.

  - id: poem-good
    human_score: good
    inputs:
      evaluated: |
        The maples cash their summer in
        for coins of rust and bronze.
        A squirrel counts the windfall twice
        before the bare boughs yawn.

  - id: poem-excellent
    human_score: excellent
    inputs:
      evaluated: |
        Autumn is the year exhaling —
        a slow surrender of pigment,
        the trees undressing in public
        without ever once apologising.

  - id: poem-perfect
    human_score: perfect
    inputs:
      evaluated: |
        October is a librarian
        re-shelving the light,
        stamping each leaf overdue,
        whispering hush to the geese
        as they file out one last time.

