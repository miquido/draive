  # ───────────── Book plot summary: "The Lighthouse Keeper" ─────────────
  # Reference claims:
  #   1. Protagonist is Mara, a young cartographer.
  #   2. She inherits a remote island lighthouse from her grandfather.
  #   3. She discovers her grandfather's hidden journals.
  #   4. The journals reveal a shipwreck cover-up from the 1920s.
  #   5. Mara is pursued by descendants of the original conspirators.
  #   6. She publishes the truth and restores the lighthouse as a museum.
  - id: book-plot-perfect
    human_score: perfect
    inputs:
      reference: |
        In "The Lighthouse Keeper," a young cartographer named Mara inherits
        a remote island lighthouse from her late grandfather. Sorting through
        the building, she discovers a stack of his hidden journals. The
        journals describe a 1920s shipwreck the local authorities had quietly
        covered up, along with the names of the families who profited. As
        Mara investigates further, descendants of those original conspirators
        begin to pursue her across the island. In the final chapters she
        succeeds in publishing the truth and restores the lighthouse as a
        small public museum dedicated to the lost ship.
      evaluated: |
        The novel follows Mara, a young cartographer who inherits a remote
        island lighthouse from her grandfather. While clearing out the
        building she finds her grandfather's hidden journals, which document
        a 1920s shipwreck that local authorities had covered up. As she digs
        deeper, descendants of the original conspirators begin hunting her
        across the island. By the end Mara publishes the journals and
        converts the lighthouse into a museum honouring the lost ship.

