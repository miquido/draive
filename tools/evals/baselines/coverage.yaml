  # ───────────── Software release notes: Helios 4.2 ─────────────
  # Reference claims:
  #   1. Adds native ARM64 support on Linux.
  #   2. New dark theme.
  #   3. Plugin API now supports asynchronous lifecycle hooks.
  #   4. Fixes a long-standing memory leak in the file watcher.
  #   5. Drops support for Python 3.8.
  #   6. Bundled SQLite driver upgraded to 3.45.
  - id: release-notes-perfect
    human_score: perfect
    inputs:
      reference: |
        Helios 4.2 adds native ARM64 support on Linux, introduces a new
        dark theme, and extends the plugin API with asynchronous lifecycle
        hooks. This release also fixes a long-standing memory leak in the
        file watcher. Support for Python 3.8 has been dropped, and the
        bundled SQLite driver has been upgraded to version 3.45.
      evaluated: |
