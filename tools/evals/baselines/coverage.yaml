evaluator: coverage
metadata:
  labelers: ["draive-team"]
  labeling_protocol: |
    Rate the EVALUATED summary on how much of the important information in
    REFERENCE it preserves. Ignore conciseness and style; only retention of
    key facts matters.
  source: synthetic

