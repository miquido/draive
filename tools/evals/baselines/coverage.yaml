  # ───────────── Scientific finding press release: superconductor ─────────────
  # Reference claims:
  #   1. Researchers at ETH Zurich discovered a new superconducting material.
  #   2. The material is a copper-bismuth alloy.
  #   3. It superconducts at 195 K (about -78 °C).
  #   4. That is roughly 60 K higher than the previous best for this family.
  #   5. The discovery was made by combining machine-learning screening with lab synthesis.
  #   6. Practical applications are still years away due to material brittleness.
  #   7. Findings were published in Nature on April 14th.
  - id: science-press-perfect
    human_score: perfect
    inputs:
      reference: |
        Researchers at ETH Zurich announced the discovery of a new
        superconducting material — a copper-bismuth alloy — that loses all
        electrical resistance at 195 K, roughly -78 °C. The result is about
        60 K higher than the previous record for this family of materials.
        The team identified the candidate compound by combining
        machine-learning screening of thousands of compositions with
        subsequent lab synthesis. They cautioned that practical applications
        remain years away because the alloy is brittle and difficult to form
        into wires. The findings were published in Nature on April 14th.
      evaluated: |
        ETH Zurich researchers have reported a new superconducting copper-
        bismuth alloy that loses resistance at 195 K (around -78 °C), about
        60 K above the previous record for this family of materials. The
        candidate was identified through machine-learning screening followed
        by lab synthesis. The authors warn that practical use is still years
        out because the alloy is brittle and hard to draw into wires. The
        work appeared in Nature on April 14th.

  - id: science-press-excellent
    human_score: excellent
    inputs:
      reference: |
        Researchers at ETH Zurich announced the discovery of a new
