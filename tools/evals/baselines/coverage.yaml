  # ───────────── Recipe: classic French onion soup ─────────────
  # Reference claims:
  #   1. Slice 1 kg of yellow onions thinly.
  #   2. Caramelise in butter over low heat for at least 45 minutes.
  #   3. Deglaze with dry white wine.
  #   4. Add beef stock and a bouquet garni; simmer 30 minutes.
  #   5. Ladle into oven-safe bowls and top with toasted baguette slices.
  #   6. Cover with Gruyère cheese and broil until bubbly and brown.
  - id: recipe-perfect
    human_score: perfect
    inputs:
      reference: |
        To make classic French onion soup, slice 1 kg of yellow onions
        thinly and caramelise them in butter over low heat for at least 45
        minutes, stirring occasionally. Deglaze the pot with dry white wine,
        then add beef stock and a bouquet garni and simmer for 30 minutes.
        Ladle the soup into oven-safe bowls, top each with toasted slices of
        baguette, cover with grated Gruyère cheese, and broil until the
        cheese is bubbly and golden brown.
      evaluated: |
        Slice 1 kg of yellow onions thinly and caramelise them in butter
        over low heat for at least 45 minutes. Deglaze with dry white wine,
        then add beef stock and a bouquet garni and simmer for 30 minutes.
        Ladle into oven-safe bowls, top with toasted baguette slices and
        grated Gruyère, then broil until bubbly and golden brown.

