        remain years away because the alloy is brittle and difficult to form
        into wires. The findings were published in Nature on April 14th.
      evaluated: |
        A team at ETH Zurich has discovered a copper-bismuth alloy that
        superconducts at 195 K, around 60 K higher than the previous best in
        its family. They found the compound using machine-learning screening
        combined with lab synthesis. The material is brittle, so practical
        applications are still some years away. The work was published in
