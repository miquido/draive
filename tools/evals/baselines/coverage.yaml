  # ═════════ Very-long-reference / short-content cases ═════════
  - id: research-study-verylongref-shortcontent-good
    human_score: good
    inputs:
      reference: |
        A two-year observational study followed 4,300 adults aged 40 to 65
        across twelve clinics to examine the relationship between weekly
        step count and cardiovascular outcomes. Participants were divided
        into four groups based on average daily steps: fewer than 4,000,
        4,000 to 7,000, 7,000 to 10,000, and more than 10,000. Researchers
        tracked heart attacks, strokes, and cardiovascular-related deaths
        over the study period, along with secondary measures including
        resting heart rate, blood pressure, and self-reported energy
        levels. The group averaging more than 10,000 steps daily had a 41
        percent lower rate of major cardiovascular events compared to the
        under-4,000 group, and the 7,000-to-10,000 group still showed a 31
        percent reduction, suggesting the benefit does not require hitting
        a specific high threshold. Notably, walking speed appeared to
        matter independently of total volume: participants who walked
        faster, regardless of total daily steps, showed additional
        reductions in resting heart rate and blood pressure. The study
        also found that the benefits were consistent across age groups and
        both sexes, though participants with pre-existing heart conditions
        at enrollment saw a smaller relative improvement than healthy
        participants. Researchers noted several limitations: step counts
        were self-reported using consumer wearables of varying accuracy,
        the study was observational rather than randomized so causation
        cannot be firmly established, and the population was drawn
        primarily from urban clinics, which may limit how well the
        findings generalize to rural populations. The authors recommend a
        randomized controlled trial as a next step to confirm the
        association and better isolate the effect of walking speed from
        total step volume.
      evaluated: |
        The study found that people who walked more had fewer heart
        attacks and strokes over the two years, and walking faster helped
        too, though the researchers said more research is needed to prove
        it's really the walking causing the improvement.

