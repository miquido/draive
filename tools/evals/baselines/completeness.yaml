  # ───────────── Changing a flat tire ─────────────
  - id: change-tire-perfect
    human_score: perfect
    inputs:
      user_query: |
        I've never changed a flat tire. Could you cover (1) how to safely
        position the car before starting, (2) the correct order for
        loosening lug nuts and jacking up the car, (3) how to swap the
        wheel, and (4) what to do with the spare afterward?
      evaluated: |
        First get the car somewhere safe: pull onto level, firm ground away
        from traffic, set the parking brake, turn on hazard lights, and chock
        the wheel diagonally opposite the flat. Loosen the lug nuts about a
        half turn while the tire is still on the ground (so the wheel can't
        spin), then place the jack at the manufacturer's lift point and raise
        the car until the flat clears the ground. Now fully remove the lug
        nuts, pull off the flat, lift the spare on, and hand-tighten the nuts
        in a star or crisscross pattern. Lower the car, then torque the nuts
        fully in that same crisscross order. Afterward, remember most spares
        are temporary "donuts" rated for low speed and short distances, so
        drive gently and get the original tire repaired or replaced and the
        nuts re-torqued as soon as possible.

  - id: change-tire-excellent
    human_score: excellent
    inputs:
      user_query: |
        I've never changed a flat tire. Could you cover (1) how to safely
        position the car before starting, (2) the correct order for
        loosening lug nuts and jacking up the car, (3) how to swap the
        wheel, and (4) what to do with the spare afterward?
      evaluated: |
        Park on level ground, set the parking brake, and turn on hazards.
        Loosen the lug nuts slightly before jacking, since the wheel needs
        to be on the ground to resist turning. Raise the car at its lift
        point, remove the nuts and the flat, fit the spare, and tighten the
        nuts in a crisscross pattern after lowering. Note that a compact
        spare is temporary, so drive slowly and get the tire fixed soon.

  - id: change-tire-good
    human_score: good
    inputs:
