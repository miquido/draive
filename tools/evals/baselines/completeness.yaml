        productivity work. Could you cover (1) battery life
        differences, (2) typical price gap, (3) repairability and
        upgradeability, and (4) which suits a Windows-vs-macOS
        preference?
      evaluated: |
        On battery life, the MacBook Air M3 typically delivers around
        15–18 hours of mixed use, while the XPS 13 with current Intel
        chips lands closer to 8–12 hours depending on configuration —
        the Apple silicon platform is meaningfully more efficient.
        Pricing puts the base MacBook Air around $1,099 and the base
        XPS 13 around $999, but matching specs (16 GB RAM, 512 GB SSD)
        usually leaves them within $100 of each other; the XPS often
        has steeper sale discounts. Repairability and upgrades favor
        neither strongly: both have soldered RAM, but the XPS at least
        has a user-accessible NVMe SSD, while the MacBook Air's
        storage is soldered to the board. On OS, the choice is mostly
        about ecosystem — pick the MacBook Air if you're invested in
        iCloud, iMessage, Continuity with an iPhone, or macOS-only
        tools; pick the XPS 13 if you need full Windows compatibility,
        x86 software, or tighter integration with Microsoft 365 and
        Active Directory environments.

