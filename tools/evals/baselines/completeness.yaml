        (4) how to practice speaking when I don't know any native
        speakers yet?
      evaluated: |
        Aim for a short, consistent daily session — even 15–20 minutes
        every day will outperform an occasional long session because
        memory consolidates with repeated exposure. For beginner
        resources, combine a structured course like Language Transfer
        (free) or the Pimsleur audio series with an app like Duolingo
        or Anki for spaced repetition; a beginner grammar book such
        as "Madrigal's Magic Key to Spanish" rounds out the basics.
        For vocabulary, use spaced-repetition flashcards built from
        words you encounter in real input (short readings, podcasts,
        TV) rather than memorising pre-made frequency lists; learn
        words in context with example sentences. To practice speaking
        without a partner, do daily out-loud shadowing of native
        audio, narrate your routine to yourself in Spanish, record
        and play back short monologues, and once you have a few
        hundred words, schedule sessions with paid tutors on iTalki or
        free language-exchange partners on Tandem.

