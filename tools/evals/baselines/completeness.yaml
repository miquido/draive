        containers?
      evaluated: |
        Docker Desktop runs on macOS once you install it. You can pull
        images and run things from them. It is widely used for
        development work and CI pipelines.

  # ───────────── Travel planning: Tokyo ─────────────
  - id: tokyo-trip-perfect
    human_score: perfect
    inputs:
      user_query: |
        I'm planning a one-week trip to Tokyo in October. Could you
        cover (1) the best way to get from Narita Airport to the city
        center, (2) a recommended neighborhood to stay in for a first
        visit, (3) the most useful transit pass, and (4) two or three
        must-see attractions?
      evaluated: |
        From Narita, the Narita Express train reaches Tokyo, Shinjuku,
        and Shibuya stations in about an hour; if you want to save
        money, the Keisei Skyliner to Ueno is a cheaper alternative.
        For a first visit, Shinjuku is a great base — it's central,
        served by many train lines, and full of restaurants and hotels;
        Shibuya and the area around Tokyo Station are good alternatives.
        Pick up a Suica or Pasmo IC card on arrival; you can tap it on
        almost every train, subway, and bus in the city, and use it at
        many shops too. For must-see sights, plan a visit to Senso-ji
        Temple in Asakusa, the Shibuya Scramble crossing and surrounding
        district, and the gardens of the Imperial Palace; if you have a
        spare day, the views from Tokyo Skytree are also worthwhile.

  - id: tokyo-trip-good
    human_score: good
    inputs:
      user_query: |
        I'm planning a one-week trip to Tokyo in October. Could you
        cover (1) the best way to get from Narita Airport to the city
        center, (2) a recommended neighborhood to stay in for a first
        visit, (3) the most useful transit pass, and (4) two or three
        must-see attractions?
      evaluated: |
        From Narita, take the Narita Express train. A Suica card is
        very useful for the metro. Visit Senso-ji and the Shibuya
        crossing while you're there.

  - id: tokyo-trip-poor
