        use, (2) which ingredients scale linearly, (3) which ones don't
        (like baking soda or salt), and (4) any adjustments to baking
        time?
      evaluated: |
        Multiply the recipe by 2.5 to get to 30 cookies. Most things
        scale up normally.

  - id: recipe-scaling-poor
