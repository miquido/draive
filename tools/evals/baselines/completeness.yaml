  # ───────────── Study planning ─────────────
  - id: study-plan-perfect
    human_score: perfect
    inputs:
      user_query: |
        I have a calculus exam in three weeks. Can you help me plan?
        Please cover (1) how to break the topics into a weekly
        schedule, (2) the most effective study techniques for math,
        (3) how to use practice problems versus reviewing notes, and
        (4) what to do in the last 48 hours before the exam.
      evaluated: |
        Start by listing every topic the exam covers and grouping them
        into three weekly chunks: in week one tackle the earlier
        foundational topics (limits, derivatives), in week two move to
        integration and applications, and reserve week three for
        mixed review and weak spots. For math specifically, active
        techniques beat passive ones: do worked examples without
        looking at the solution, use spaced repetition for definitions
        and key theorems, and explain each technique out loud as if
        teaching it. Practice problems should be the bulk of your
        time — aim for roughly 70% problem-solving and 30% reviewing
        notes, and treat each missed problem as an opportunity to fix
        a specific gap. In the last 48 hours, switch from learning new
        material to consolidating: do one full timed mock exam, review
        only your error log, sleep at least 7–8 hours the night before,
        and keep the morning of the exam light — a short warm-up of
        easy problems is better than cramming new ones.

  - id: study-plan-excellent
    human_score: excellent
    inputs:
      user_query: |
        I have a calculus exam in three weeks. Can you help me plan?
        Please cover (1) how to break the topics into a weekly
        schedule, (2) the most effective study techniques for math,
        (3) how to use practice problems versus reviewing notes, and
        (4) what to do in the last 48 hours before the exam.
      evaluated: |
        Split the topics across three weeks — foundational material
        first, harder topics second, and full review in the last week.
        For math, practice problems beat re-reading notes; spend most
        of your time solving and only review notes to fill specific
        gaps. In the final two days, take a timed mock exam, review
        your mistakes, and sleep well the night before.

  - id: study-plan-good
    human_score: good
    inputs:
      user_query: |
        I have a calculus exam in three weeks. Can you help me plan?
        Please cover (1) how to break the topics into a weekly
        schedule, (2) the most effective study techniques for math,
        (3) how to use practice problems versus reviewing notes, and
        (4) what to do in the last 48 hours before the exam.
      evaluated: |
        Divide the topics over the three weeks, with the last week
        for review. Solve lots of practice problems — they're more
        useful than re-reading notes. Make sure you sleep well before
        the exam.

  - id: study-plan-poor
    human_score: poor
    inputs:
      user_query: |
        I have a calculus exam in three weeks. Can you help me plan?
        Please cover (1) how to break the topics into a weekly
        schedule, (2) the most effective study techniques for math,
        (3) how to use practice problems versus reviewing notes, and
        (4) what to do in the last 48 hours before the exam.
      evaluated: |
        Calculus was developed independently by Newton and Leibniz in
        the 17th century.

  # ───────────── Parenting: toddler sleep ─────────────
  - id: toddler-sleep-perfect
    human_score: perfect
    inputs:
      user_query: |
        My two-year-old is fighting bedtime. Can you cover (1) how
        many hours of sleep a toddler typically needs, (2) what a
        consistent bedtime routine should include, (3) how to handle
        the child getting out of bed repeatedly, and (4) when to
        consider talking to a pediatrician?
      evaluated: |
        Two-year-olds generally need about 11–14 hours of sleep in a
        24-hour period, often a single afternoon nap of 1–2 hours plus
        10–12 hours overnight. A predictable wind-down routine helps
        signal sleep: dim lights about 30 minutes before bed, give a
        warm bath or a quiet activity, read one or two books, and end
        in the dark room with the same words each night. If the child
        keeps getting out of bed, calmly walk them back without
        engaging in long conversation — minimal eye contact, a quick
        "It's sleep time," and leave. Consistency matters more than
        any single technique; expect a few rough nights before the
        pattern improves. Consider talking to your pediatrician if
        sleep resistance lasts more than a few weeks despite a
        consistent routine, or if you notice loud snoring, pauses in
        breathing, persistent night terrors, or daytime behavior
        suggesting they're severely under-rested.

  - id: toddler-sleep-excellent
    human_score: excellent
    inputs:
      user_query: |
        My two-year-old is fighting bedtime. Can you cover (1) how
        many hours of sleep a toddler typically needs, (2) what a
        consistent bedtime routine should include, (3) how to handle
        the child getting out of bed repeatedly, and (4) when to
        consider talking to a pediatrician?
      evaluated: |
        Toddlers usually need 11–14 hours of sleep total each day. A
        good routine is bath, books, and bed at the same time each
        night. If they keep getting out of bed, calmly return them
        without much interaction. Talk to a pediatrician if problems
        persist for more than a few weeks or if you notice snoring or
        breathing issues during sleep.

  - id: toddler-sleep-good
    human_score: good
    inputs:
      user_query: |
        My two-year-old is fighting bedtime. Can you cover (1) how
        many hours of sleep a toddler typically needs, (2) what a
        consistent bedtime routine should include, (3) how to handle
        the child getting out of bed repeatedly, and (4) when to
        consider talking to a pediatrician?
      evaluated: |
        Two-year-olds need a lot of sleep, around 12 hours total. Try
        to keep a consistent routine — bath, story, lights out. If
        they keep getting up, gently put them back without making a
        fuss.

  - id: toddler-sleep-poor
    human_score: poor
    inputs:
