      evaluated: |
        Running has been a popular sport for decades. Olympic marathons
        are exciting to watch on television.

  # ───────────── Finance: emergency fund ─────────────
  - id: emergency-fund-perfect
    human_score: perfect
    inputs:
      user_query: |
        Can you explain emergency funds? Please cover (1) what an
        emergency fund is, (2) how many months of expenses it should
        cover, (3) where to keep the money, and (4) how to build one
        from scratch.
      evaluated: |
        An emergency fund is a pool of cash set aside specifically for
        unexpected expenses such as job loss, urgent medical bills, or
        major home repairs — it keeps you from having to borrow at high
        interest or sell investments at a bad time. A common rule of
        thumb is three to six months of essential living expenses; six
        to nine months is wiser if your income is variable or you're
        the sole earner. Keep the money somewhere safe and accessible
        but separate from your everyday checking, typically a
        high-yield savings or money-market account at an FDIC-insured
        bank — not in stocks. To build one from scratch, start with a
        small initial goal like one month of expenses, automate a
        recurring transfer right after payday, and funnel windfalls
        (bonuses, tax refunds) into the account until you reach your
        target.

  - id: emergency-fund-fair
    human_score: fair
    inputs:
      user_query: |
        Can you explain emergency funds? Please cover (1) what an
        emergency fund is, (2) how many months of expenses it should
        cover, (3) where to keep the money, and (4) how to build one
        from scratch.
      evaluated: |
        An emergency fund is savings that you can use if something
        unexpected happens.

  - id: emergency-fund-poor
    human_score: poor
    inputs:
