  # ───────────── Choosing a first houseplant ─────────────
  - id: first-houseplant-perfect
    human_score: perfect
    inputs:
      user_query: |
        I want a low-maintenance houseplant for a dim apartment. Could you
        cover (1) two or three plants that tolerate low light, (2) how often
        to water them, (3) signs I'm overwatering, and (4) whether they're
        safe around pets?
      evaluated: |
        For a dim apartment, good low-light choices include the snake plant
        (Sansevieria), ZZ plant, and pothos — all tolerate shade and
        neglect well. Water them sparingly: roughly every two to three weeks,
        and only once the top inch or two of soil is dry; in low light they
        use water slowly, so err on the side of less. Signs of overwatering
        include yellowing leaves, soft or mushy stems, a soggy or sour-smelling
        soil surface, and gnats hovering around the pot. On pet safety, the
        snake plant and ZZ plant are mildly toxic if chewed and can cause
        stomach upset, and pothos is toxic to cats and dogs, so if you have
        pets that nibble plants, place them out of reach or choose a pet-safe
        alternative like a spider plant or parlor palm.

