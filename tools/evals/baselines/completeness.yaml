      evaluated: |
        Tokyo has many tourists in October because the weather is
        pleasant. You should bring comfortable shoes for walking.

  # ───────────── Fitness: starting running ─────────────
  - id: starting-running-perfect
    human_score: perfect
    inputs:
      user_query: |
        I want to start running for fitness. Could you address (1) how
        often to run per week as a beginner, (2) how to avoid common
        injuries, (3) what kind of shoes to look for, and (4) how to
        progress over the first three months?
      evaluated: |
        As a beginner, aim for three runs per week with at least one
        rest day between sessions — this gives connective tissue time
        to adapt and limits overuse risk. To avoid common injuries,
        warm up with a few minutes of brisk walking before each run,
        keep an easy conversational pace for most sessions, and
        increase your weekly mileage by no more than about 10% per
        week. For shoes, visit a running store if you can and look for
        a neutral cushioned trainer that matches your foot shape; the
        most important thing is comfort, not brand. Over the first
        three months, follow a walk/run plan: in month one alternate
        short runs with walking breaks, in month two work toward 20–30
        continuous minutes of running, and in month three add a
        slightly longer weekend run and start to think about pace.

  - id: starting-running-fair
    human_score: fair
    inputs:
      user_query: |
        I want to start running for fitness. Could you address (1) how
        often to run per week as a beginner, (2) how to avoid common
        injuries, (3) what kind of shoes to look for, and (4) how to
        progress over the first three months?
      evaluated: |
        Running is great for cardiovascular health. Start slowly and
        try to enjoy it. Many people use apps to track their runs.

  - id: starting-running-poor
    human_score: poor
