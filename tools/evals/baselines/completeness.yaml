  # ───────────── Legal/admin: US passport renewal ─────────────
  - id: passport-renewal-perfect
    human_score: perfect
    inputs:
      user_query: |
        How do I renew my US passport by mail? Please cover (1) which
        form to use, (2) what documents I need to send, (3) the current
        fee, and (4) roughly how long it takes.
      evaluated: |
        To renew a US passport by mail, use Form DS-82 — it's available
        only to adults whose most recent passport is undamaged, was
        issued within the past 15 years, was issued when they were 16
        or older, and was issued in their current name (or you can
        document a name change). You'll need to mail in the completed
        DS-82, your most recent passport, one new color passport photo
        meeting the State Department's specifications, and proof of any
        legal name change if applicable. The fee is currently $130 for
        a passport book, plus a $60 expedited service surcharge if you
        want faster processing. Standard processing typically takes
        6–8 weeks, and expedited service usually takes 2–3 weeks; both
        timelines can vary, so check the State Department's status page
        before assuming.

  - id: passport-renewal-excellent
    human_score: excellent
    inputs:
      user_query: |
        How do I renew my US passport by mail? Please cover (1) which
        form to use, (2) what documents I need to send, (3) the current
        fee, and (4) roughly how long it takes.
      evaluated: |
        Use Form DS-82 if you qualify for mail renewal. Send your
        previous passport, the completed form, and a new passport
        photo. The fee is $130 for a standard passport book. Routine
        processing usually takes around 6 to 8 weeks.

  - id: passport-renewal-fair
    human_score: fair
    inputs:
