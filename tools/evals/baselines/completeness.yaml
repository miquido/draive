  # ───────────── Starting a compost bin ─────────────
  - id: compost-bin-perfect
    human_score: perfect
    inputs:
      user_query: |
        I want to start composting kitchen scraps in my backyard. Could you
        cover (1) what materials I can and can't compost, (2) the right
        balance of greens and browns, (3) how often to turn the pile, and
        (4) how long until the compost is ready to use?
      evaluated: |
        You can compost fruit and vegetable scraps, coffee grounds, eggshells,
        and yard trimmings, but avoid meat, dairy, oily food, and pet waste,
        which attract pests and smell. Aim for a rough balance of "greens"
        (nitrogen-rich material like food scraps and fresh grass) and "browns"
        (carbon-rich material like dry leaves, cardboard, and straw); a common
        target is roughly two to three parts browns for each part greens by
        volume, adjusting if the pile gets slimy (add browns) or stays dry
        (add greens and water). Turn the pile about once a week to add oxygen
        and speed decomposition; more frequent turning makes it finish faster.
        Under good conditions the compost is usually ready in two to six
        months, when it looks dark and crumbly and smells earthy rather than
        sour.

