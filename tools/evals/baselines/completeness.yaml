  # ───────────── Recipe scaling ─────────────
  - id: recipe-scaling-excellent
    human_score: excellent
    inputs:
      user_query: |
        I have a chocolate chip cookie recipe that serves 12 and I want
        to make it for 30. Can you explain (1) the multiplier I should
        use, (2) which ingredients scale linearly, (3) which ones don't
        (like baking soda or salt), and (4) any adjustments to baking
        time?
      evaluated: |
        For 30 cookies from a 12-cookie recipe, multiply by 2.5. Most
        ingredients — flour, sugar, butter, eggs, chocolate chips —
        scale linearly at that 2.5x rate. Leaveners (baking soda,
        baking powder) and salt usually don't scale linearly at large
        multiples; start at about 2x and adjust to taste. The baking
        time per tray stays roughly the same since each cookie is the
        same size; you'll just need more trays or batches.

  - id: recipe-scaling-fair
    human_score: fair
    inputs:
