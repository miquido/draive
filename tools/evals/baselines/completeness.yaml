  # ───────────── Backing up a phone ─────────────
  - id: phone-backup-perfect
    human_score: perfect
    inputs:
      user_query: |
        I want to back up my iPhone before upgrading. Could you cover
        (1) the difference between iCloud and computer backups, (2) how to
        check that a backup actually completed, (3) what data a backup does
        and doesn't include, and (4) how to restore onto the new phone?
      evaluated: |
        There are two main ways to back up. An iCloud backup runs wirelessly
        and stores an encrypted copy in Apple's cloud, while a computer
        backup made through Finder (or iTunes on Windows) saves a full local
        copy that can also be encrypted to include passwords and Health data.
        To confirm an iCloud backup finished, open Settings, tap your name,
        then iCloud > iCloud Backup, and check the "last successful backup"
        time; for a computer backup, look at the device's backup list in
        Finder for today's date. A backup includes app data, settings,
        messages, photos (if not already synced separately), and your home
        layout, but it does not include the apps themselves (they
        re-download) or anything already stored only in other clouds. To
        restore, turn on the new phone, and on the setup screen choose
        "Restore from iCloud Backup" or connect it to the computer and pick
        the saved backup, then let it download apps and data.

