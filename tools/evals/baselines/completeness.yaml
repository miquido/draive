        young children.

  # ───────────── Home repair: leaky faucet ─────────────
  - id: leaky-faucet-perfect
    human_score: perfect
    inputs:
      user_query: |
        My bathroom faucet is dripping. Can you cover (1) how to
        figure out what type of faucet I have, (2) how to shut off the
        water before repair, (3) the most common cause of a drip, and
        (4) the basic tools I'll need?
      evaluated: |
        Most household faucets fall into one of four families:
        compression (separate hot/cold handles that screw down),
        cartridge (single or double handle that pivots smoothly),
        ball-type (single handle that rotates over a rounded base),
        and ceramic-disc (single handle on a wide cylindrical body).
        The shape of the handle and base usually tells you which
        you've got. Before any repair, close the shut-off valves
        under the sink by turning them clockwise; if there are no
        local valves, shut off the main water supply for the house.
        The most common cause of a drip is a worn rubber washer or
        O-ring on a compression faucet, or a worn cartridge on
        single-handle faucets. For tools, you'll typically need an
        adjustable wrench, a Phillips and a flat-head screwdriver,
        needle-nose pliers, and replacement washers or a cartridge
        matched to your faucet brand and model — taking the old part
        to the hardware store is the easiest way to find the right
        replacement.

  - id: leaky-faucet-excellent
    human_score: excellent
    inputs:
      user_query: |
        My bathroom faucet is dripping. Can you cover (1) how to
        figure out what type of faucet I have, (2) how to shut off the
        water before repair, (3) the most common cause of a drip, and
        (4) the basic tools I'll need?
      evaluated: |
        Faucets are usually compression, cartridge, ball, or
        ceramic-disc — the handle style tells you which. Shut off
        the supply at the valves under the sink before disassembly.
        A worn washer or cartridge is the typical cause of a drip.
        Have an adjustable wrench, screwdrivers, and a replacement
        part ready.

  - id: leaky-faucet-good
    human_score: good
    inputs:
