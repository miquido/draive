evaluator: completeness
metadata:
  labelers: ["draive-team"]
  labeling_protocol: |
    Rate the EVALUATED response purely on how thoroughly it addresses every
    aspect of USER_QUERY. Ignore factual correctness, style, and fluency.
  source: synthetic

samples:
  # ───────────── Cooking: hard-boiled eggs ─────────────
  - id: hard-boiled-eggs-excellent
    human_score: excellent
    inputs:
      user_query: |
        How do I make hard-boiled eggs? Please cover (1) how long to boil
        them, (2) whether to start in cold or boiling water, (3) how to
        peel them easily, and (4) how long they keep in the fridge.
      evaluated: |
        Start the eggs in cold water and bring them to a boil, then cook
        for about 10 minutes for hard yolks. After cooking, dunk them in
        an ice bath so they cool quickly and the shells come off cleanly.
        In their shells in the fridge they will stay good for around a
        week.

  - id: hard-boiled-eggs-good
    human_score: good
    inputs:
      user_query: |
        How do I make hard-boiled eggs? Please cover (1) how long to boil
        them, (2) whether to start in cold or boiling water, (3) how to
        peel them easily, and (4) how long they keep in the fridge.
      evaluated: |
        Boil the eggs for about 10 minutes. Putting them into ice water
        afterwards makes them easier to peel. You can keep them in the
        fridge for several days.

  - id: hard-boiled-eggs-fair
    human_score: fair
    inputs:
      user_query: |
        How do I make hard-boiled eggs? Please cover (1) how long to boil
        them, (2) whether to start in cold or boiling water, (3) how to
        peel them easily, and (4) how long they keep in the fridge.
      evaluated: |
        Boil the eggs in water for around 10 minutes and they will be
        hard. Older eggs sometimes peel a little easier than very fresh
        ones.

  # ───────────── Docker setup ─────────────
  - id: docker-setup-excellent
    human_score: excellent
    inputs:
      user_query: |
        I want to get started with Docker on macOS. Can you cover
        (1) how to install Docker Desktop, (2) what the difference is
        between an image and a container, (3) the basic command to run a
        container from an image, and (4) how to see currently running
        containers?
      evaluated: |
        Download Docker Desktop from docker.com and install it like any
        other Mac app. An image is a packaged template that contains an
        app and its dependencies, while a container is a running copy of
        that image. To start a container you use `docker run <image>`,
        and to see what is currently running you use `docker ps`.

  - id: docker-setup-good
    human_score: good
    inputs:
      user_query: |
        I want to get started with Docker on macOS. Can you cover
        (1) how to install Docker Desktop, (2) what the difference is
        between an image and a container, (3) the basic command to run a
        container from an image, and (4) how to see currently running
        containers?
      evaluated: |
        Install Docker Desktop from the Docker website. To start a
        container, run `docker run <image>`. Use `docker ps` to see what
        is running. Images and containers are different concepts — an
        image is more like a template.

  - id: docker-setup-fair
    human_score: fair
    inputs:
