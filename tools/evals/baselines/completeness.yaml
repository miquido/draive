  # ───────────── Debugging: Python ImportError ─────────────
  - id: python-import-error-perfect
    human_score: perfect
    inputs:
      user_query: |
        My Python script keeps failing with ImportError. Could you
        cover (1) common causes of ImportError, (2) how to check if a
        package is actually installed, (3) how virtual environments
        relate to this, and (4) the difference between ImportError and
        ModuleNotFoundError?
      evaluated: |
        Common causes include the package not being installed at all,
        being installed in a different Python environment than the one
        running your script, a typo in the import name, a circular
        import inside your own code, or a module that exists but does
        not export the name you tried to import. To check whether a
        package is actually installed, run `pip show <package>` or
        `python -m pip list` from the same interpreter you use to run
        the script — `which python` and `which pip` should point at the
        same environment. Virtual environments are central to this
        because each venv has its own isolated set of installed
        packages; if you forgot to activate the venv (or activated a
        different one), a package you installed earlier will appear
        "missing." Finally, `ModuleNotFoundError` is a subclass of
        `ImportError` — it's specifically raised when the named module
        cannot be located at all, while a plain `ImportError` can also
        mean the module was found but a specific name inside it
        couldn't be imported.

  - id: python-import-error-excellent
    human_score: excellent
    inputs:
      user_query: |
        My Python script keeps failing with ImportError. Could you
        cover (1) common causes of ImportError, (2) how to check if a
        package is actually installed, (3) how virtual environments
        relate to this, and (4) the difference between ImportError and
        ModuleNotFoundError?
      evaluated: |
        ImportError usually means the package isn't installed, isn't
        installed in the active environment, or the name you're
        importing doesn't exist. Use `pip list` (or `pip show <pkg>`)
        with the same interpreter that runs your script to confirm.
        Virtual environments isolate packages per project, so an
        un-activated venv can make a package look missing.
        `ModuleNotFoundError` is a subclass of `ImportError` raised
        specifically when the module itself can't be found.

  - id: python-import-error-good
    human_score: good
    inputs:
      user_query: |
        My Python script keeps failing with ImportError. Could you
        cover (1) common causes of ImportError, (2) how to check if a
        package is actually installed, (3) how virtual environments
        relate to this, and (4) the difference between ImportError and
        ModuleNotFoundError?
      evaluated: |
        ImportError happens when Python can't import what you asked
        for, often because the package isn't installed. Run `pip list`
        to check. Virtual environments have their own packages, so the
        wrong env can cause this too.

  - id: python-import-error-fair
    human_score: fair
    inputs:
      user_query: |
        My Python script keeps failing with ImportError. Could you
        cover (1) common causes of ImportError, (2) how to check if a
        package is actually installed, (3) how virtual environments
        relate to this, and (4) the difference between ImportError and
        ModuleNotFoundError?
      evaluated: |
        ImportError usually means the package isn't installed where
        Python is looking.

  - id: python-import-error-poor
    human_score: poor
    inputs:
      user_query: |
