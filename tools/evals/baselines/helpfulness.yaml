        avoid?
      evaluated: |
        Stick with low-impact cardio like cycling and pool running to
        keep your fitness while the knee finishes healing. Add some
        glute and hip strengthening since those help knee stability.
        Reintroduce running gradually — short walk-run intervals
        first, then longer continuous runs. Avoid hills and sprints
        until you're symptom-free. Back off if anything hurts.

