        detergent.
      evaluated: |
        Blot the stain gently, then flush it from the back with cold water.
        Work in a little dish soap and white vinegar, wait about 10 minutes,
        and rinse. If it is still visible, try a short baking-soda paste
        treatment, then wash with detergent in cold water. Do not put the
        shirt in the dryer until the stain is gone.

