  # ───────────── Negotiate salary offer ─────────────
  - id: salary-negotiation-perfect
    human_score: perfect
    inputs:
      user_query: |
        I got a job offer for a senior backend role at $135k. Market for
        this role in my city is more like $150-160k and I have a competing
        offer at $148k. I really want this job but I want to negotiate.
        How should I respond to the recruiter?
      evaluated: |
        You're in a strong spot: you have market data and a real competing
        offer. Negotiate on base first, by email so the recruiter can take
        it to the hiring manager in writing.

        Anchor slightly above your target so there's room to settle at
        $155k. A script:

        "Thank you — I'm genuinely excited about this role and the team.
        I'd like to make it work. Based on my research for senior backend
        roles in [city], the range is $150–160k, and I currently have a
        competing offer at $148k. To move forward enthusiastically, I'm
        looking for a base of $158k. I'm flexible on how we get there —
        base, signing bonus, or an early review — and happy to sign quickly
        once we land on a number."

        Key moves:
        - Lead with enthusiasm so it reads as "help me say yes," not a
          threat.
        - Name the competing offer once, as a fact, not a club.
        - Give one specific number, not a range (ranges get read as the
          low end).
        - Offer flexibility on structure — if they're capped on base, a
          $10k signing bonus or a 6-month review to $160k is real money.

        If they counter at $148–150k, that's a win versus $135k; accept or
        ask for the signing bonus to bridge the gap. Don't accept on the
        call — say "let me review the full package and confirm tomorrow."

