  # ───────────── Math: Derivative ─────────────
  - id: math-derivative-perfect
    human_score: perfect
    inputs:
      user_query: |
        I'm stuck finding the derivative of f(x) = x^2 * sin(x). I
        know the answer is supposed to use the product rule but I
        keep getting confused about which part is which. Can you
        walk me through it?
      evaluated: |
        The product rule says: if f(x) = u(x) * v(x), then
            f'(x) = u'(x) * v(x) + u(x) * v'(x).

        Step 1 — label the pieces. Pick which factor is u and which
        is v. It doesn't matter which is which, just be consistent:
            u(x) = x^2
            v(x) = sin(x)

        Step 2 — differentiate each piece on its own:
            u'(x) = 2x          (power rule)
            v'(x) = cos(x)      (standard derivative of sin)

        Step 3 — plug into the rule. Write it out before simplifying:
            f'(x) = u'(x) * v(x)  +  u(x) * v'(x)
                  = (2x)(sin(x)) +  (x^2)(cos(x))

        So f'(x) = 2x·sin(x) + x²·cos(x).

        The trick people get stuck on is mixing up which factor gets
        differentiated. Always write the template first
        (u'·v + u·v'), then drop the labelled pieces in — never try
        to compute it in your head.

  - id: math-derivative-good
    human_score: good
    inputs:
      user_query: |
        I'm stuck finding the derivative of f(x) = x^2 * sin(x). I
        know the answer is supposed to use the product rule but I
        keep getting confused about which part is which. Can you
        walk me through it?
      evaluated: |
        Use the product rule: (uv)' = u'v + uv'. Let u = x² and
        v = sin(x). Then u' = 2x and v' = cos(x). Putting it
        together gives f'(x) = 2x·sin(x) + x²·cos(x).

