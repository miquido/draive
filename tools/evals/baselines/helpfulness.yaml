        Mind, Public Speaking, Latin American Literature, or
        Linguistics 101. I want something that strengthens my
        thinking for grad-school CS applications. Which should I
        pick and why?
      evaluated: |
        Pick Linguistics 101.

        For a CS application, the strongest signal you can send is
        that you can reason formally about messy systems —
        linguistics maps onto CS more directly than the others:
        formal grammars, syntax trees, phonological rules, finite-
        state machines. It's almost free overlap with theory of
        computation and NLP. Admissions readers also recognize that
        bridge.

        Runner-up: Philosophy of Mind, if your interest leans toward
        AI/ML grad work — it pairs well with arguments around
        cognition, consciousness, and what counts as understanding.
        Less directly useful as a "skill," but it shows the kind of
        intellectual range adcoms appreciate.

        Skip Public Speaking (useful life skill, but won't move a
        grad app) and Latin American Lit (great course, but the
        signal-to-grad-school is weakest of the four).

        Tactical note: take Linguistics, and ask the professor in
        office hours about NLP/comp-ling research opportunities by
        midterm — that's the kind of relationship that turns an
        elective into a recommendation letter.

