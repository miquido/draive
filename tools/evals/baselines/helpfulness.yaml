  # ───────────── Roommate Dispute ─────────────
  - id: roommate-dispute-excellent
    human_score: excellent
    inputs:
      user_query: |
        My roommate keeps leaving dirty dishes in the sink for days.
        I've hinted twice and it hasn't changed. We're otherwise
        friendly and I don't want to blow up the relationship. How
        do I bring this up directly without it becoming a fight?
      evaluated: |
        Hints are easy to miss; you need one direct, low-temperature
        conversation. Do it in person, not over text, and not in the
        moment when the sink is full (defensive).

        A script that usually lands well:

        "Hey, can we talk for two minutes about the kitchen? Not a
        big deal, but the dishes in the sink have been getting to me
        more than I expected. Can we agree on a rule — like dishes
        rinsed and in the dishwasher by the end of the day they're
        used? I'd rather just sort it now than keep stewing on it."

        Three things this does: names a concrete behavior, proposes
        a specific rule (not a vague "be tidier"), and signals you
        value the relationship enough to bring it up directly. Then
        actually listen — there may be context you don't know.

        If it still doesn't change after a week, follow up once:
        "Hey, the dish thing again — what's making it hard? Can we
        adjust the rule?" Most disputes resolve at step one or two.

  - id: roommate-dispute-good
    human_score: good
    inputs:
      user_query: |
        My roommate keeps leaving dirty dishes in the sink for days.
        I've hinted twice and it hasn't changed. We're otherwise
        friendly and I don't want to blow up the relationship. How
        do I bring this up directly without it becoming a fight?
      evaluated: |
        Have a direct conversation in person at a calm moment, not
        right after seeing dirty dishes. Be specific about the
        behavior and propose a concrete rule (like dishes done by
        end of day). Keep your tone friendly and listen to their
        side. Most people respond better to a clear ask than to
        repeated hints.

  - id: roommate-dispute-fair
    human_score: fair
    inputs:
      user_query: |
        My roommate keeps leaving dirty dishes in the sink for days.
        I've hinted twice and it hasn't changed. We're otherwise
        friendly and I don't want to blow up the relationship. How
        do I bring this up directly without it becoming a fight?
      evaluated: |
        Good communication is the key to healthy relationships. Use
        "I" statements, choose a good time to talk, be respectful,
        listen actively, and try to find a compromise. Conflict
        resolution is an important life skill. Don't let things
        build up.

