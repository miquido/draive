  # ───────────── Houseplant dying ─────────────
  - id: dying-plant-perfect
    human_score: perfect
    inputs:
      user_query: |
        My peace lily's leaves are turning yellow and drooping. It's by a
        north-facing window, I water it every 3 days, and it's in a pot
        with no drainage hole. The soil feels wet. What's wrong and how do
        I save it?
      evaluated: |
        The smoking gun is right there: wet soil plus a pot with no drainage
        hole. You're overwatering, and the water has nowhere to go, so the
        roots are sitting in standing water and starting to rot. Yellow,
        drooping leaves on a peace lily are the classic overwatering sign
        (counterintuitively, droopy can mean too much OR too little — the
        wet soil tells you it's too much here).

        Do this today:
        1. Take the plant out of the pot and look at the roots. Healthy
           roots are firm and white; rotted ones are brown, mushy, and
           smell. Snip away any mushy roots with clean scissors.
        2. Repot into a container WITH drainage holes, using fresh, lightly
           damp potting mix. If you love the decorative pot, keep it as a
           "cachepot" — put the plant in a plain plastic nursery pot with
           holes, set that inside the pretty one, and never let water pool
           in the bottom.
        3. New watering rule: water only when the top 2–3 cm of soil feels
           dry to your finger — for a peace lily that's usually about once
           a week, not every 3 days. When you water, let it drain fully.

        Light is fine — peace lilies tolerate a north window. Give it a
        week or two; new growth means you caught it in time.

  - id: dying-plant-excellent
    human_score: excellent
    inputs:
      user_query: |
        My peace lily's leaves are turning yellow and drooping. It's by a
        north-facing window, I water it every 3 days, and it's in a pot
        with no drainage hole. The soil feels wet. What's wrong and how do
        I save it?
      evaluated: |
        You're overwatering, and the pot with no drainage is making it
        worse — the roots are sitting in water and starting to rot, which
        is why the leaves yellow and droop. Repot it into a container with
        drainage holes and fresh potting mix, trimming off any brown, mushy
        roots first. Then water only when the top couple of centimetres of
