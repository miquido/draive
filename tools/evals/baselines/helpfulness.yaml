  # ───────────── Reset Wi-Fi router ─────────────
  - id: reset-router-perfect
    human_score: perfect
    inputs:
      user_query: |
        My home Wi-Fi suddenly stopped working. The router (a Netgear
        Nighthawk) has a solid white power light but no internet light.
        Devices connect to the network but say "no internet." I haven't
        changed anything. How do I get it back online?
      evaluated: |
        "Connected but no internet" with a dark internet light means the
        router talks to your devices fine but isn't getting a signal from
        your ISP. Work outward from the modem:

        1. Power-cycle the chain in order. Unplug the modem AND the
           Nighthawk. Wait 60 seconds. Plug the modem back in first and
           wait until its lights settle (~2 min), THEN plug the router
           back in. Order matters: the router needs a live modem to
           pull an address.
        2. Check the cable between modem and router's yellow WAN/Internet
           port. Reseat both ends; try a different Ethernet cable if you
           have one — a flaky cable is a common cause of exactly this.
        3. If the modem itself shows no online/downstream light after its
           reboot, the outage is upstream — call your ISP and ask if
           there's a service issue at your address.
        4. If the modem is online but the router still won't get internet,
           log into the router (192.168.1.1) → check the Internet status
           page. If it shows "no IP," click "Release/Renew" or reboot once
           more.

        Most cases clear at step 1. If after a clean modem-then-router
        reboot the modem is online but the router isn't, you've isolated
        it to the cable or the router's WAN port — try the spare cable
        next.

  - id: reset-router-excellent
    human_score: excellent
    inputs:
      user_query: |
        My home Wi-Fi suddenly stopped working. The router (a Netgear
        Nighthawk) has a solid white power light but no internet light.
        Devices connect to the network but say "no internet." I haven't
        changed anything. How do I get it back online?
      evaluated: |
        No internet light usually means the router isn't getting a signal
        from your modem or ISP. Unplug both the modem and the router, wait
        a minute, then power the modem back on first and let it fully boot
        before turning the router back on. Also reseat the cable between
        the modem and the router's internet port, or swap in a different
        cable. If the modem's own online light stays off after rebooting,
        the problem is on your ISP's side, so call them.

