        sleep packed too close together, so he's not tired enough to settle.
        Try capping the daycare nap at around an hour and pushing bedtime
        a little later for now, then nudging it earlier again over time.
        Pair that with a short, consistent wind-down and a calm, low-drama
        response when he gets out of bed: walk him back quietly every time
        without much talk. Give it a week of consistency before judging it.

