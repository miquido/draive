  # ───────────── Toddler won't sleep ─────────────
  - id: toddler-sleep-perfect
    human_score: perfect
    inputs:
      user_query: |
        My 2-year-old has started fighting bedtime hard — crying, getting
        out of bed, calling for us for over an hour. It started about two
        weeks ago. Bedtime is 7:30, he still naps 2 hours at daycare. We're
        exhausted. What can we actually do?
      evaluated: |
        Two things jump out: the timing ("started two weeks ago") points to
        a normal developmental sleep regression or a too-early bedtime, and
        the 2-hour daycare nap may now be too much daytime sleep for a
        2-year-old. Here's a concrete plan.

        First, fix the sleep pressure math. A 2-year-old needs roughly
        11–12 hours total. If he naps 2 hours and you want 11 hours
        overnight, he physically can't fall asleep at 7:30 if he woke at
        6:30 and napped midday — he's simply not tired yet. Try:
        - Cap the nap at ~1 to 1.5 hours (ask daycare to wake him).
        - Temporarily push bedtime to 8:00–8:15 for a week so he's
          genuinely sleepy when he goes down, then walk it back by 15 min
          every few nights.

        Second, make the boundary calm and boring. The crying-and-getting-
        out routine is partly testing a new skill (climbing out, calling
        out). Pick one approach and be 100% consistent for at least a week:
        - Do a short, fixed wind-down (bath, 2 books, song) and a clear
          "goodnight, see you in the morning."
        - If he gets out, walk him back with as little talk/eye contact as
          possible — "it's sleep time" — every single time. The boredom is
          the point; engagement (even frustrated) rewards the behavior.

        Two weeks of a too-late nap + too-early bedtime is exactly the
        recipe for an hour of bedtime battles. Adjust the schedule first;
        most of the drama fades within a week once the sleep pressure is
        right. If it persists past 2–3 weeks of consistency, mention it at
        his next pediatric check.

  - id: toddler-sleep-excellent
    human_score: excellent
    inputs:
      user_query: |
        My 2-year-old has started fighting bedtime hard — crying, getting
