  # ───────────── Workout With Knee Injury ─────────────
  - id: workout-knee-injury-excellent
    human_score: excellent
    inputs:
      user_query: |
        I sprained my left knee 3 weeks ago. My doctor cleared me for
        low-impact exercise. I want to stay in shape for a 10K I'm
        running in 8 weeks. What can I safely do, and what should I
        avoid?
      evaluated: |
        With doctor clearance for low-impact, structure the next 8
        weeks around three things: cardio that spares the knee,
        targeted hip + glute work (the main contributors to knee
        stability), and a gradual return to running.

        Weeks 1–3 (now): cycle or pool-run 3x/week, 30–45 min,
        moderate effort. Add 2x/week strength: glute bridges, side-
        lying clamshells, single-leg balance, calf raises. Skip
        running entirely.

        Weeks 4–5: introduce treadmill walk-run (e.g. 1 min jog / 2
        min walk for 30 min). If no pain or swelling next morning,
        progress to 2:1, then 3:1.

        Weeks 6–7: continuous easy runs up to 5 km, plus one cycle
        session. Skip speed work.

        Race week: one easy 3 km shakeout 3 days out, then rest.

        Avoid: hill running, plyometrics, lunges, anything that hurts
        during or the day after. Stop and ice if you feel a sharp
        pain (vs general muscle soreness). 8 weeks to a 10K from
        cleared-but-not-yet-running is doable if you skip a session
        any time the knee complains rather than push through.

  - id: workout-knee-injury-good
    human_score: good
    inputs:
      user_query: |
        I sprained my left knee 3 weeks ago. My doctor cleared me for
        low-impact exercise. I want to stay in shape for a 10K I'm
        running in 8 weeks. What can I safely do, and what should I
        avoid?
      evaluated: |
        Stick with low-impact cardio like cycling and pool running to
        keep your fitness while the knee finishes healing. Add some
        glute and hip strengthening since those help knee stability.
        Reintroduce running gradually — short walk-run intervals
        first, then longer continuous runs. Avoid hills and sprints
        until you're symptom-free. Back off if anything hurts.

  - id: workout-knee-injury-poor
    human_score: poor
    inputs:
      user_query: |
