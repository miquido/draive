  # ───────────── Learn Guitar in Limited Time ─────────────
  - id: learn-guitar-weekend-excellent
    human_score: excellent
    inputs:
      user_query: |
        I have an acoustic guitar that's been sitting unused for a
        year. I have a wedding in 6 weeks and want to be able to
        play and sing one specific song ("Can't Help Falling in
        Love") well enough not to embarrass myself. I can practice
        30 min/day on weekdays. Where do I start?
      evaluated: |
        Drop "learn guitar" and just learn this one song. 6 weeks at
        30 min/day is plenty for a beginner-friendly chord song like
        this.

        Week 1: tune the guitar (use the free GuitarTuna app).
        Learn just four chords: C, G, Am, F. Skip the full-barre F
        — use the easier "mini-F" (4-string version). 15 min/day on
        clean chord shapes, 15 min on switching between C↔G and
        Am↔F.
        Week 2: keep working chord switches to one second or
        faster. Add a simple down-down-down-down strum in time with
        a metronome at 60 BPM.
        Weeks 3–4: play along with the song using a chord chart
        from Ultimate-Guitar (search the song title; pick a 4–5 star
        chord version, capo as suggested for an easier key).
        Practice singing one line at a time while playing — this is
        the hardest part for most people.
        Weeks 5–6: full play-throughs daily, end-to-end. Record
        yourself on your phone once a week; it'll feel awkward but
        it surfaces the wobbly parts faster than anything else.

        Day of: don't drink before, capo your easier key, breathe
        before starting. Aim for "competent and heartfelt," not
        "perfect."

  - id: learn-guitar-weekend-good
    human_score: good
    inputs:
      user_query: |
        I have an acoustic guitar that's been sitting unused for a
        year. I have a wedding in 6 weeks and want to be able to
        play and sing one specific song ("Can't Help Falling in
        Love") well enough not to embarrass myself. I can practice
        30 min/day on weekdays. Where do I start?
      evaluated: |
        Focus only on that one song rather than learning guitar
        broadly. Look up the chords online (it's a fairly simple
        progression), use a capo for an easier key if needed, and
        spend the first couple of weeks just on clean chord changes.
        Then add a basic strumming pattern, then add singing on top.
        Record yourself once a week to catch mistakes. You should
        be fine in 6 weeks.

  - id: learn-guitar-weekend-fair
    human_score: fair
    inputs:
      user_query: |
        I have an acoustic guitar that's been sitting unused for a
