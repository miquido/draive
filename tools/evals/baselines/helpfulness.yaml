  # ───────────── Red wine stain ─────────────
  - id: red-wine-stain-perfect
    human_score: perfect
    inputs:
      user_query: |
        How do I remove a fresh red wine stain from a cotton shirt? I am
        at home and have dish soap, white vinegar, baking soda, and laundry
        detergent.
      evaluated: |
        Blot first; do not rub, because rubbing pushes the wine into the
        cotton. Hold the stained area under cold running water from the
        back of the fabric. Work in a little dish soap plus white vinegar,
        let it sit for about 10 minutes, then rinse. If color remains, make
        a loose baking-soda paste for a few minutes, rinse again, and wash
        with detergent on a cool cycle. Check the shirt before drying
        because heat can set any remaining stain.

  - id: red-wine-stain-excellent
    human_score: excellent
    inputs:
