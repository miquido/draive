        the way that you go about doing it is as follows. You start by
        taking some sugar and placing it into a pan — and that pan, by
        the way, should be one of the heavier varieties rather than a
        thin one. You then place the pan over a burner set to medium
        heat. As the sugar warms up, the important thing to remember is
        that you should not, under any circumstances, stir it; instead,
        just let it sit and melt on its own until it has fully
