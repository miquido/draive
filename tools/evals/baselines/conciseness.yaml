  # ───────────── UI behavior ─────────────
  - id: ui-behavior-perfect
    human_score: perfect
    inputs:
      reference: |
        Pressing the Escape key closes any open dialog and returns focus
        to the element that originally opened it. If no dialog is open,
        the keypress is ignored.
      evaluated: |
        Escape closes the open dialog and restores focus to its opener;
        otherwise no-op.

  - id: ui-behavior-good
    human_score: good
    inputs:
      reference: |
        Pressing the Escape key closes any open dialog and returns focus
        to the element that originally opened it. If no dialog is open,
        the keypress is ignored.
      evaluated: |
        When the user presses the Escape key, any dialog that happens to
        be open at that moment will close. Focus will then be returned to
        whichever element it was that originally opened the dialog in the
        first place. In the case that no dialog is currently open, then
        nothing happens — the keypress is simply ignored.

  - id: ui-behavior-fair
    human_score: fair
    inputs:
      reference: |
        Pressing the Escape key closes any open dialog and returns focus
        to the element that originally opened it. If no dialog is open,
        the keypress is ignored.
      evaluated: |
        In terms of how the user interface behaves in response to certain
        key presses, one particular behavior that is worth describing has
        to do with what happens when the user goes ahead and presses the
        key on the keyboard that is commonly known as the Escape key. In
        the event that there is, at the time of the keypress, a dialog
        that happens to be open on the screen, that dialog will then be
        closed as a direct result of the Escape keypress. Furthermore,
        the focus, which is to say the part of the interface that is
        currently active for input, will be returned to whichever
        element it was that was originally responsible for having opened
        the dialog in the first place. On the other hand, if there is no
        dialog open at the time the key is pressed, then the keypress
        will simply be ignored and nothing will happen.

  # ───────────── Historical event ─────────────
  - id: historical-event-perfect
    human_score: perfect
    inputs:
      reference: |
        The Berlin Wall fell on November 9, 1989, after East German
        officials mistakenly announced that border crossings to the West
        were immediately open, drawing crowds that the guards declined
        to hold back.
      evaluated: |
        On 9 Nov 1989, a botched East German announcement opened the
        border; crowds arrived and guards stood down — the Wall fell.

  - id: historical-event-excellent
    human_score: excellent
    inputs:
      reference: |
        The Berlin Wall fell on November 9, 1989, after East German
        officials mistakenly announced that border crossings to the West
        were immediately open, drawing crowds that the guards declined
        to hold back.
      evaluated: |
        On November 9, 1989, East German officials wrongly announced
        that border crossings were open immediately. Crowds gathered,
        guards refused to push back, and the Wall fell.

  - id: historical-event-poor
    human_score: poor
    inputs:
      reference: |
        The Berlin Wall fell on November 9, 1989, after East German
        officials mistakenly announced that border crossings to the West
        were immediately open, drawing crowds that the guards declined
        to hold back.
      evaluated: |
        It is, perhaps, one of the most well-known and frequently
        discussed events of the late twentieth century, and the date on
        which it occurred — that date being the ninth day of the month
        of November in the year 1989 — is one that has come to be widely
        remembered as the day on which the Berlin Wall, the wall that
        had for so many years stood as a physical and symbolic divider
        between the eastern and western halves of the city of Berlin,
        finally came down. The series of events that led up to this
        moment, when one takes the time to look back on them, are
        themselves rather remarkable. What happened, in essence, what
        this basically means, was that certain officials within the East
        German government, in the course of giving a public announcement,
        ended up making a mistake — they stated, incorrectly, that the
        border crossings leading into West Germany were, as of that very
        moment, open for passage. As soon as this announcement reached
        the ears of the public, large crowds of people began to gather
        at the various crossing points along the wall, and the guards
        who were stationed at those crossings, finding themselves faced
        with such overwhelming numbers, made the decision not to hold
        the crowds back.

