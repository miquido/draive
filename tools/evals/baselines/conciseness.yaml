  - id: tool-usage-good
    human_score: good
    inputs:
      reference: |
        To use the command, type `grep` followed by the pattern in quotes
        and the file path. Add the -i flag for case-insensitive matching
        and -r to search recursively through directories.
      evaluated: |
        To use the command, you type `grep`, then put the pattern in
        quotes, and after that the file path. There are also some flags
        you can add: the -i flag makes the matching case-insensitive,
        and the -r flag tells it to search through directories
        recursively.

  - id: tool-usage-poor
    human_score: poor
    inputs:
      reference: |
        To use the command, type `grep` followed by the pattern in quotes
        and the file path. Add the -i flag for case-insensitive matching
        and -r to search recursively through directories.
      evaluated: |
        When the time comes that you find yourself wanting to make use
        of the command in question, what you'll want to do, as a general
        matter, is the following: begin by typing out the name of the
        command itself, which in this case is `grep`, and then, once you
        have done that, what comes next is the pattern that you are
        looking to search for — that pattern, it should be noted, ought
        to be enclosed within a pair of quotation marks so that the
        shell handles it correctly. After the pattern has been written
        out in that way, the next thing to follow is the path to the
        file or files in which you would like the search to be carried
        out. In addition to these basic components of the command, there
        are also a couple of flags that you may find it useful to make
        use of, depending on the circumstances of your particular
        search. The first of these is the -i flag, which, when included,
        has the effect of making the matching process case-insensitive,
        meaning that uppercase and lowercase letters will be treated as
        equivalent. The second flag worth mentioning is the -r flag,
        which, when added to the command, causes the search to proceed
        recursively through the contents of any directories that are
        included in the path.

