evaluator: conciseness
metadata:
  labelers: ["draive-team"]
  labeling_protocol: |
    Rate the EVALUATED passage purely on conciseness relative to REFERENCE.
    All rewrites convey the same core information; judge only how compactly.
  source: synthetic

samples:
  # ───────────── Refund policy ─────────────
  - id: refund-policy-perfect
    human_score: perfect
    inputs:
      reference: |
        Customers may return unused items within 30 days of delivery for a
        full refund. The original receipt is required, and refunds are
        issued to the original payment method within 5 business days.
      evaluated: |
        Unused items: 30-day return window, receipt required; refunds hit
        the original payment method within 5 business days.

  - id: refund-policy-good
    human_score: good
    inputs:
      reference: |
        Customers may return unused items within 30 days of delivery for a
        full refund. The original receipt is required, and refunds are
        issued to the original payment method within 5 business days.
      evaluated: |
        If you have an unused item, you can send it back within 30 days
        after delivery. You will need to have the original receipt with
        you. Once the return is processed, the refund will be sent to the
        payment method you used, and that usually takes 5 business days.

  - id: refund-policy-fair
    human_score: fair
    inputs:
      reference: |
        Customers may return unused items within 30 days of delivery for a
        full refund. The original receipt is required, and refunds are
        issued to the original payment method within 5 business days.
      evaluated: |
        So basically, if you happen to have an item that you have not used
        yet, then what you can do is go ahead and return it, and you have
        a window of 30 days from the day it was delivered to you. You'll
        want to make sure you keep the receipt, because the original
        receipt is something that will be required for the return to be
        processed. After everything goes through, the refund itself will
        be sent back to the same payment method that was originally used,
        and that part typically takes around 5 business days to complete.

  - id: refund-policy-poor
    human_score: poor
    inputs:
      reference: |
        Customers may return unused items within 30 days of delivery for a
        full refund. The original receipt is required, and refunds are
        issued to the original payment method within 5 business days.
      evaluated: |
        It is important to note that, in essence, what this basically
        means is that our valued customers, should they find themselves
        in a situation where they have purchased an item from us and have
        not yet made any use of that item whatsoever, do in fact have the
        option, at their discretion, to send said item back to us. The
        time period during which this can be done, it should be mentioned,
        is a full 30 days, and those 30 days are counted from the very
        day on which the item was delivered to the customer in question.
        Furthermore, and this is something we cannot stress enough, the
        original receipt — that is to say, the receipt that was given at
        the time of the original purchase — is absolutely required in
        order for the return to proceed. Once all of that has been taken
        care of and the return has been received and processed on our
        end, the refund itself will then, in turn, be issued back to the
        customer using the very same payment method that was originally
        used at the time of purchase, and the typical timeline for that
        to happen is approximately 5 business days.

  # ───────────── Research finding ─────────────
  - id: research-finding-excellent
    human_score: excellent
    inputs:
      reference: |
        A 2023 study of 4,000 office workers found that those who took a
        10-minute walk after lunch reported 22% fewer afternoon energy
        slumps compared to coworkers who remained at their desks.
      evaluated: |
        In a 2023 study of 4,000 office workers, taking a 10-minute walk
        after lunch was linked to 22% fewer afternoon energy slumps
        compared with staying at the desk.

  - id: research-finding-good
    human_score: good
    inputs:
      reference: |
        A 2023 study of 4,000 office workers found that those who took a
        10-minute walk after lunch reported 22% fewer afternoon energy
        slumps compared to coworkers who remained at their desks.
      evaluated: |
        A study from 2023 looked at 4,000 office workers. It found that
        the ones who went for a walk for about 10 minutes after their
        lunch break ended up reporting fewer afternoon energy dips. The
        difference came out to about 22% fewer slumps than the workers
        who chose to stay at their desks.

  - id: research-finding-fair
    human_score: fair
    inputs:
      reference: |
        A 2023 study of 4,000 office workers found that those who took a
        10-minute walk after lunch reported 22% fewer afternoon energy
        slumps compared to coworkers who remained at their desks.
      evaluated: |
        There was a study, conducted back in the year 2023, and what this
        particular study did was take a look at a group of office workers
        — quite a large group, in fact, with the number being 4,000 in
        total. What the study went on to find was that the workers in
        question who made the choice to go on a walk, with that walk
        lasting around 10 minutes, after they had finished eating their
        lunch, those workers reported having afternoon energy slumps about
        22% less often than was the case for the other workers, who chose
        instead to simply stay seated at their desks.

  - id: research-finding-poor
    human_score: poor
    inputs:
      reference: |
        A 2023 study of 4,000 office workers found that those who took a
        10-minute walk after lunch reported 22% fewer afternoon energy
        slumps compared to coworkers who remained at their desks.
      evaluated: |
        It is, perhaps, worth mentioning at the outset that there exists
        a study, and this study, which was carried out in the relatively
        recent year of 2023, set out to examine the working habits and
        general wellbeing of a sizable population of individuals — namely,
        office workers, of whom there were a grand total of 4,000 who
        agreed to participate. What the researchers behind this study
        were ultimately able to discover, after analyzing the data they
        had collected, was a finding that, in essence, what this basically
        means is the following: among the workers who, on a regular basis,
        made the decision to go out and take a walk of approximately 10
        minutes in length, with that walk taking place shortly after the
        conclusion of their lunchtime meal, there was a noticeable and
        measurable reduction in the frequency with which they reported
        experiencing those familiar afternoon energy slumps that so many
        office workers know all too well. The exact number, when compared
        with those of their coworkers who chose instead to remain at
        their desks during that same time period, came out to a
        difference of around 22 percentage points, or roughly 22% fewer
        slumps overall.

