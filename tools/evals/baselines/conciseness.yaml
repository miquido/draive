        When the time comes that you would like to set about brewing yourself
        a cup of coffee, the approach that you'll want to take, generally
        speaking, runs more or less as follows. You begin by giving some
        thought to the amount of water you intend to use, and for every six
        ounces of that water, the quantity of ground coffee that you ought to
        be measuring out comes to somewhere in the neighborhood of two
        tablespoons. Once you have your grounds ready and waiting, the next
        thing to do is to take some water that has only just finished coming
        to a boil and to pour that water over the top of the grounds. From
        there, what is called for is a period of patience, during which you
        allow the coffee to steep for a duration that amounts to roughly four
        minutes, and only after that has elapsed do you then proceed to press
        the coffee down or otherwise strain it.

  - id: coffee-brew-poor
    human_score: poor
    inputs:
      reference: |
