      evaluated: |
        It is, in many respects, a most pleasant and worthwhile undertaking
        to prepare for oneself a freshly brewed cup of coffee, and while the
        process by which this is accomplished is not, on the whole, an
        especially difficult one, there are nonetheless a number of steps and
        considerations involved that would seem to merit a careful and
        unhurried explanation. To begin at the beginning, then, one must first
        turn one's attention to the question of proportions, and more
        particularly to the relationship between the quantity of water on the
        one hand and the quantity of ground coffee on the other. The
        guideline that is generally put forward in this regard holds that for
        each and every six ounces of water that one proposes to make use of,
        the corresponding amount of ground coffee that ought to be measured
        out and set aside is an amount in the vicinity of two tablespoons.
        Having attended to that initial matter of measurement, one then
        proceeds to the question of the water itself, and here the advice is
        to take water that has been heated to the point of boiling and then
        allowed to settle just slightly below that point, and to pour this
        water, in a steady fashion, over the grounds that have been prepared.
        What follows next is a span of waiting, the purpose of which is to
        permit the coffee to steep and to develop its flavor, and the
        duration of this steeping is one that ought to come to approximately
        four minutes in length. Only once those four minutes have fully run
        their course should one then move on to the concluding step, which
        consists of either pressing the grounds down toward the bottom of the
        vessel or else straining the liquid so as to separate it from them.

