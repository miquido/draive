      evaluated: |
        In the event that you are, on a given day, finding yourself in
        the kind of mood where what you would like to do is prepare and
        make some caramel from scratch in your own kitchen, then the
        process by which this is accomplished, while not particularly
        complicated, does involve a number of steps that are worth going
        over in some detail. To begin with, the very first thing that
        you will need to do is gather up some sugar, the amount of which
        will of course depend on how much caramel you are looking to
        produce, and then take that sugar and transfer it into a pan.
        Now, when it comes to the pan that you choose to use for this
        particular task, it is worth pointing out that not just any pan
        will do — what you want is a pan that is on the heavier side,
        as opposed to one of the thinner, lighter sorts of pans, because
        a heavier pan will conduct heat more evenly. Once you have got
        the sugar in the pan, the next step is to place that pan onto
        the stovetop and turn the burner underneath it on to a medium
        heat setting. Here is where one of the more important pieces of
        advice comes in: as the sugar begins to heat up, you should make
        absolutely sure that you do not stir it — just leave it alone
        and let it do its thing, melting gradually and changing color
        until it has reached a lovely amber hue. At that point, what
        you will want to do is remove the pan from the heat source, and
        then, taking great care because the mixture will be extremely
        hot, you will whisk in some cream that you have previously
        warmed up.

