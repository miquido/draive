  # ───────────── Movie plot ─────────────
  - id: movie-plot-perfect
    human_score: perfect
    inputs:
      reference: |
        A young farmer discovers he is the heir to a galactic kingdom and
        joins a band of rebels to destroy an evil empire's superweapon
        before it can annihilate the last free planet.
      evaluated: |
        A farm boy turned heir joins rebels to blow up the empire's
        superweapon before it destroys the last free planet.

  - id: movie-plot-good
    human_score: good
    inputs:
      reference: |
        A young farmer discovers he is the heir to a galactic kingdom and
        joins a band of rebels to destroy an evil empire's superweapon
        before it can annihilate the last free planet.
      evaluated: |
        A young farmer ends up finding out that he is the heir to a
        galactic kingdom. He then joins a band of rebels who are trying
        to destroy the evil empire's superweapon, and they have to do
        this before the weapon can wipe out the last free planet.

  - id: movie-plot-fair
    human_score: fair
    inputs:
      reference: |
        A young farmer discovers he is the heir to a galactic kingdom and
        joins a band of rebels to destroy an evil empire's superweapon
        before it can annihilate the last free planet.
      evaluated: |
        The story is about this young guy, who at the start of things is
        just a regular farmer leading a pretty ordinary kind of life.
        However, as the story progresses, he comes to discover something
        very surprising about himself — namely, that he is, in fact, the
        heir to a kingdom that spans the whole galaxy. After learning
        this, he decides to throw in his lot with a group of rebels who
        are fighting against the empire, and together they set off on a
        mission to destroy the empire's massive superweapon before that
        weapon gets the chance to annihilate what happens to be the last
        free planet in the galaxy.

  - id: movie-plot-poor
    human_score: poor
    inputs:
      reference: |
        A young farmer discovers he is the heir to a galactic kingdom and
        joins a band of rebels to destroy an evil empire's superweapon
        before it can annihilate the last free planet.
      evaluated: |
        It is, in many ways, a rather classic kind of tale, and the
        general gist of what the story is about, when you really get
        down to it, is something along the following lines. There is, to
        start with, this young man, and at the time we first meet him in
        the story he is, for all intents and purposes, leading the life
        of a simple and unassuming farmer, working the land and going
        about his days without any inkling whatsoever of what is to come.
        As the plot unfolds, however, it becomes clear, both to him and
        to the audience, that he is in fact something much more than just
        a humble farmer — he is, as it turns out, the rightful heir to a
        vast and sprawling kingdom that extends across the entirety of
        the known galaxy. Once this revelation has taken place, he goes
        on to align himself with a band of plucky rebels who have been
        waging a long and difficult campaign against an evil and
        oppressive empire. Together, this newly assembled group sets
        themselves to the task of destroying the empire's most fearsome
        creation, a superweapon of immense power, and they must do this
        with great urgency, because if they fail, the weapon will go on
        to annihilate what is, by this point in the story, the very last
        free planet remaining in the entire galaxy.

  # ───────────── Kitchen tool ─────────────
  - id: kitchen-tool-excellent
    human_score: excellent
    inputs:
      reference: |
        A microplane is a fine grater used to zest citrus, grate hard
        cheeses, and shave whole spices like nutmeg into a powder.
      evaluated: |
        A microplane is a fine grater. It zests citrus, grates hard
        cheeses, and shaves whole spices such as nutmeg into a powder.

  - id: kitchen-tool-fair
    human_score: fair
    inputs:
      reference: |
        A microplane is a fine grater used to zest citrus, grate hard
        cheeses, and shave whole spices like nutmeg into a powder.
      evaluated: |
        The microplane is a tool that you can use in the kitchen, and
        what it does, essentially, is act as a grater that is quite a
        bit finer than your typical box grater. People use it for a
        variety of different purposes, including taking the zest off of
        citrus fruits, as well as for grating hard cheeses down into
        small flakes, and you can also use it to shave whole spices,
        such as nutmeg for instance, into a fine powder.

  - id: kitchen-tool-poor
    human_score: poor
    inputs:
      reference: |
        A microplane is a fine grater used to zest citrus, grate hard
        cheeses, and shave whole spices like nutmeg into a powder.
      evaluated: |
        When it comes to the wide variety of tools that one might find
        in any well-equipped kitchen, the microplane is one such tool
        that is, perhaps, deserving of a closer look. What it is, at the
        most basic level, is a grater — though it should be noted that
        it is a grater of a particularly fine variety, which sets it
        apart from the more familiar kinds of graters such as the box
        grater that many home cooks are likely to have on hand. The uses
        to which the microplane can be put are, as it turns out, fairly
        numerous, and these uses include, but are by no means limited
        to, the following: it can be used to remove the zest from the
        outer layer of citrus fruits, it can be employed in the grating
        of hard cheeses into fine, snow-like flakes, and it is also
        quite useful when it comes to the shaving of whole spices, with
        nutmeg being perhaps the most familiar example, down into a
        powder-like form.

  # ───────────── Tax concept ─────────────
  - id: tax-concept-excellent
    human_score: excellent
    inputs:
      reference: |
        A tax deduction reduces the income on which you owe tax, while a
        tax credit directly reduces the tax bill itself. A $100 credit
        saves more than a $100 deduction at every income level.
      evaluated: |
        A deduction lowers the income you're taxed on; a credit lowers
        the tax bill directly. A $100 credit always saves more than a
        $100 deduction.

  - id: tax-concept-good
    human_score: good
    inputs:
      reference: |
        A tax deduction reduces the income on which you owe tax, while a
        tax credit directly reduces the tax bill itself. A $100 credit
        saves more than a $100 deduction at every income level.
      evaluated: |
        A tax deduction works by lowering the amount of income that you
        are taxed on. A tax credit, on the other hand, reduces the tax
        bill itself. Because of this, a $100 credit will save you more
        money than a $100 deduction, no matter what income level you're
        at.

  - id: tax-concept-fair
    human_score: fair
    inputs:
      reference: |
        A tax deduction reduces the income on which you owe tax, while a
        tax credit directly reduces the tax bill itself. A $100 credit
        saves more than a $100 deduction at every income level.
      evaluated: |
        When it comes to the way that taxes work, a tax deduction is
        essentially something that has the effect of reducing the amount
        of your income that ends up being subject to taxation. A tax
        credit, by contrast, is something that works in a somewhat
        different manner, in that it directly reduces the actual tax
        bill that you owe. As a result of this difference, what ends up
        being true is that a credit in the amount of $100 will always
        save you more money than a deduction of the same $100 amount,
        and this is the case regardless of what income level you happen
        to be at.

  # ───────────── Sports rule ─────────────
  - id: sports-rule-perfect
    human_score: perfect
    inputs:
      reference: |
        In soccer, a player is offside if they are nearer to the opponent's
        goal line than both the ball and the second-last defender at the
        moment the ball is played to them by a teammate.
      evaluated: |
        Offside: at the pass, the receiving player is closer to the goal
        line than both the ball and the second-last defender.

  - id: sports-rule-excellent
    human_score: excellent
    inputs:
      reference: |
        In soccer, a player is offside if they are nearer to the opponent's
        goal line than both the ball and the second-last defender at the
        moment the ball is played to them by a teammate.
      evaluated: |
        In soccer, a player is offside when, at the moment a teammate
        plays the ball, they are closer to the opponent's goal line than
        both the ball and the second-last defender.

  - id: sports-rule-poor
    human_score: poor
    inputs:
      reference: |
        In soccer, a player is offside if they are nearer to the opponent's
        goal line than both the ball and the second-last defender at the
        moment the ball is played to them by a teammate.
      evaluated: |
        Within the sport that is most commonly known around the world
        under the name of soccer — though it should be noted that in
        certain other parts of the world, such as in the United Kingdom,
        the very same sport is more often referred to by the name of
        football instead — there exists a rule, one which is among the
        more frequently misunderstood of the rules of the game, and that
        particular rule goes by the name of offside. What this rule
        states, in essence, what this basically means, is the following:
        a player on the field of play is to be considered offside in the
        event that, at the very moment in time at which the ball happens
        to be played in their direction by one of their fellow teammates,
        that player is positioned in such a way that they are nearer to
        the goal line of their opponents than two things — the first of
        these two things being the ball itself, and the second of them
        being the defender on the opposing team who happens, at that
        moment, to be the second-to-last defender from the back.

  # ───────────── Chemical reaction ─────────────
  - id: chemical-reaction-excellent
    human_score: excellent
    inputs:
      reference: |
        When baking soda meets vinegar, the acetic acid in the vinegar
        reacts with the sodium bicarbonate to release carbon dioxide gas,
        which is what produces the visible foaming.
      evaluated: |
        Mixing baking soda and vinegar lets the acetic acid react with
        sodium bicarbonate, releasing carbon dioxide gas — the foam you
        see.

  - id: chemical-reaction-good
    human_score: good
    inputs:
      reference: |
        When baking soda meets vinegar, the acetic acid in the vinegar
        reacts with the sodium bicarbonate to release carbon dioxide gas,
        which is what produces the visible foaming.
      evaluated: |
        When you mix baking soda together with vinegar, the acetic acid
        that is in the vinegar reacts with the sodium bicarbonate, which
        is what baking soda is made of. This reaction releases carbon
        dioxide as a gas, and that gas is what creates the foam that you
        can see.

  - id: chemical-reaction-fair
    human_score: fair
    inputs:
      reference: |
        When baking soda meets vinegar, the acetic acid in the vinegar
        reacts with the sodium bicarbonate to release carbon dioxide gas,
        which is what produces the visible foaming.
      evaluated: |
        When you take some baking soda and you go ahead and add it
        together with some vinegar, what ends up happening is that a
        chemical reaction takes place between the two of them. More
        specifically, the acetic acid, which is the acid that is found
        within vinegar, ends up reacting with the sodium bicarbonate,
        which is the compound that baking soda is essentially made of.
        The result of this reaction is the release of a gas — carbon
        dioxide, to be precise — and it is this gas that is responsible
        for producing the foaming that you can clearly see with your own
        eyes.

  - id: chemical-reaction-poor
    human_score: poor
    inputs:
      reference: |
        When baking soda meets vinegar, the acetic acid in the vinegar
        reacts with the sodium bicarbonate to release carbon dioxide gas,
        which is what produces the visible foaming.
      evaluated: |
        It is, perhaps, worth taking a moment to consider what is
        actually going on, at the chemical level, when one happens to
        bring together two of the more commonly encountered substances
        in any ordinary household kitchen — namely, the substance known
        as baking soda on the one hand, and the substance known as
        vinegar on the other. As it happens, when these two things are
        brought into contact with one another, a reaction takes place,
        and the reaction in question is, in essence, what this basically
        means, the following sort of thing. The vinegar, you see,
        contains within it a particular kind of acid that goes by the
        name of acetic acid, and the baking soda, for its part, is
        composed of a compound that is referred to as sodium bicarbonate.
        When the acetic acid in the vinegar comes into contact with the
        sodium bicarbonate in the baking soda, the two of them react
        together, and what this reaction produces, among other things,
        is a gas — specifically, carbon dioxide gas. It is this very
        carbon dioxide gas, as it bubbles up out of the mixture, that is
        ultimately responsible for the visible foaming effect that one
        can plainly observe with one's own eyes.

